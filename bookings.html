<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>HTM Rentals | Bookings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #F8F9FA;
            padding: 20px;
        }
        :root {
            --navy: #0A2540;
            --ocean: #006994;
            --turquoise: #40B5AD;
            --gray-light: #F8F9FA;
            --gray-border: #E5E5E5;
            --gray-text: #6C757D;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--gray-border);
            flex-wrap: wrap;
            gap: 16px;
        }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--navy); }
        .back-link { color: var(--ocean); text-decoration: none; font-size: 1rem; }
        
        .card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }
        .search-box button {
            padding: 12px 24px;
            background: var(--turquoise);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Filters */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--gray-border);
        }
        .filter-group {
            flex: 1;
            min-width: 150px;
        }
        .filter-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-text);
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: white;
        }
        .filter-actions {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }
        .filter-actions button {
            padding: 10px 16px;
            background: var(--turquoise);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
        }
        .filter-actions button.clear {
            background: var(--gray-text);
        }
        
        /* Desktop Table View */
        .desktop-table {
            display: block;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--gray-border);
        }
        th {
            font-weight: 600;
            color: var(--gray-text);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            font-size: 14px;
        }
        
        /* Mobile Card View */
        .mobile-cards {
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .booking-item {
            background: white;
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-md);
            padding: 16px;
        }
        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .guest-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--navy);
        }
        .booking-detail {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            font-size: 14px;
            color: var(--gray-text);
            flex-wrap: wrap;
        }
        .booking-detail i {
            width: 20px;
            color: var(--turquoise);
        }
        .booking-detail strong {
            color: var(--navy);
            font-weight: 600;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-pending { background: #FFF3CD; color: #856404; }
        .badge-confirmed { background: #D4EDDA; color: #155724; }
        .badge-cancelled { background: #F8D7DA; color: #721C24; }
        
        .btn-sm {
            padding: 6px 12px;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .btn-confirm { background: var(--success); color: white; }
        .btn-cancel { background: var(--warning); color: #333; }
        .btn-delete { background: var(--danger); color: white; }
        
        .loading { text-align: center; padding: 40px; color: var(--gray-text); }
        .empty { text-align: center; padding: 40px; color: var(--gray-text); }
        
        .message {
            padding: 14px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            display: none;
        }
        .message.success { background: #D4EDDA; color: #155724; display: block; }
        .message.error { background: #F8D7DA; color: #721C24; display: block; }
        
        @media (max-width: 768px) {
            body { padding: 12px; }
            .card { padding: 16px; }
            .desktop-table { display: none; }
            .mobile-cards { display: flex; }
            .filter-group { min-width: 100%; }
        }
        
        @media (min-width: 769px) {
            .desktop-table { display: block; }
            .mobile-cards { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Bookings</h1>
            <a href="admin.html" class="back-link">← Back to Admin</a>
        </div>
        
        <div class="card">
            <!-- Filters -->
            <div class="filters">
                <div class="filter-group">
                    <label>Status</label>
                    <select id="status-filter">
                        <option value="">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>From Date</label>
                    <input type="date" id="from-date">
                </div>
                <div class="filter-group">
                    <label>To Date</label>
                    <input type="date" id="to-date">
                </div>
                <div class="filter-group">
                    <label>Unit</label>
                    <select id="unit-filter">
                        <option value="">All Units</option>
                    </select>
                </div>
                <div class="filter-actions">
                    <button onclick="applyFilters()">Apply Filters</button>
                    <button class="clear" onclick="clearFilters()">Clear</button>
                </div>
            </div>
            
            <!-- Search -->
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search by guest name or phone..." onkeyup="applyFilters()">
                <button onclick="applyFilters()"><i class="fas fa-search"></i> Search</button>
                <button onclick="loadAllBookings()" style="background: var(--gray-text);"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
            
            <div id="message" class="message"></div>
            
            <!-- Desktop Table View -->
            <div id="desktop-table" class="desktop-table">
                <div id="bookings-container" class="loading">Loading bookings...</div>
            </div>
            
            <!-- Mobile Card View -->
            <div id="mobile-cards" class="mobile-cards">
                <div class="loading">Loading bookings...</div>
            </div>
        </div>
    </div>

    <script>
        // ==================== AUTHENTICATION CHECK ====================
        if (!sessionStorage.getItem('adminToken')) {
            window.location.href = 'admin.html';
        }
        // ============================================================

        const API_BASE_URL = 'https://api.htmrentals.com/api';
        function getToken() { return sessionStorage.getItem('adminToken'); }
        function authHeaders(extra) { return { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json', ...extra }; }
        function handleAuthError(res) { if (res && res.status === 401) { sessionStorage.removeItem('adminToken'); window.location.href = 'admin.html'; return true; } return false; }
        
        let allBookings = [];
        let allUnits = [];
        
        async function loadAllBookings() {
            const desktopContainer = document.getElementById('bookings-container');
            const mobileContainer = document.getElementById('mobile-cards');
            desktopContainer.innerHTML = '<div class="loading">Loading bookings...</div>';
            mobileContainer.innerHTML = '<div class="loading">Loading bookings...</div>';
            
            try {
                const res = await fetch(`${API_BASE_URL}/admin/bookings`, { headers: authHeaders() });
                if (handleAuthError(res)) return;
                const data = await res.json();
                
                if (data.success) {
                    allBookings = data.bookings;
                    await loadUnits();
                    applyFilters();
                } else {
                    desktopContainer.innerHTML = '<div class="empty">Failed to load bookings</div>';
                    mobileContainer.innerHTML = '<div class="empty">Failed to load bookings</div>';
                }
            } catch(e) {
                console.error(e);
                desktopContainer.innerHTML = '<div class="empty">Error loading bookings</div>';
                mobileContainer.innerHTML = '<div class="empty">Error loading bookings</div>';
            }
        }
        
        async function loadUnits() {
            try {
                const res = await fetch(`${API_BASE_URL}/admin/units`, { headers: authHeaders() });
                const data = await res.json();
                if (data.success) {
                    allUnits = data.units;
                    const unitSelect = document.getElementById('unit-filter');
                    unitSelect.innerHTML = '<option value="">All Units</option>' + 
                        allUnits.map(u => `<option value="${u.id}">${escapeHtml(u.unit_name)}</option>`).join('');
                }
            } catch(e) {
                console.error(e);
            }
        }
        
        function applyFilters() {
            const status = document.getElementById('status-filter').value;
            const fromDate = document.getElementById('from-date').value;
            const toDate = document.getElementById('to-date').value;
            const unitId = document.getElementById('unit-filter').value;
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            let filtered = [...allBookings];
            
            if (status) {
                filtered = filtered.filter(b => b.booking_status === status);
            }
            
            if (unitId) {
                filtered = filtered.filter(b => b.unit_id == unitId);
            }
            
            if (fromDate) {
                const from = new Date(fromDate);
                from.setHours(0, 0, 0, 0);
                filtered = filtered.filter(b => {
                    const checkIn = new Date(b.check_in_date);
                    return checkIn >= from;
                });
            }
            if (toDate) {
                const to = new Date(toDate);
                to.setHours(23, 59, 59, 999);
                filtered = filtered.filter(b => {
                    const checkIn = new Date(b.check_in_date);
                    return checkIn <= to;
                });
            }
            
            if (searchTerm) {
                filtered = filtered.filter(b => 
                    b.guest_name.toLowerCase().includes(searchTerm) || 
                    (b.guest_phone && b.guest_phone.includes(searchTerm))
                );
            }
            
            displayBookingsDesktop(filtered);
            displayBookingsMobile(filtered);
        }
        
        function clearFilters() {
            document.getElementById('status-filter').value = '';
            document.getElementById('from-date').value = '';
            document.getElementById('to-date').value = '';
            document.getElementById('unit-filter').value = '';
            document.getElementById('search-input').value = '';
            applyFilters();
        }
        
        function displayBookingsDesktop(bookings) {
            const container = document.getElementById('bookings-container');
            
            if (!bookings || bookings.length === 0) {
                container.innerHTML = '<div class="empty">No bookings found</div>';
                return;
            }
            
            container.innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Guest</th>
                            <th>Unit</th>
                            <th>Check In</th>
                            <th>Check Out</th>
                            <th>Nights</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${bookings.map(booking => `
                            <tr>
                                <td>
                                    <strong>${escapeHtml(booking.guest_name)}</strong><br>
                                    <small style="color: var(--gray-text);">${booking.guest_phone || ''}</small>
                                  </td>
                                <td>${escapeHtml(booking.unit_name || 'N/A')}</td>
                                <td>${formatDate(booking.check_in_date)}</td>
                                <td>${formatDate(booking.check_out_date)}</td>
                                <td>${booking.total_nights || '?'}</td>
                                <td>${booking.currency === 'MVR' ? 'MVR' : '$'}${parseFloat(booking.total_amount || 0).toFixed(2)}</td>
                                <td><span class="badge badge-${booking.booking_status}">${booking.booking_status}</span></td>
                                <td class="action-buttons">
                                    ${getActionButtons(booking)}
                                 </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function displayBookingsMobile(bookings) {
            const container = document.getElementById('mobile-cards');
            
            if (!bookings || bookings.length === 0) {
                container.innerHTML = '<div class="empty">No bookings found</div>';
                return;
            }
            
            container.innerHTML = bookings.map(booking => `
                <div class="booking-item">
                    <div class="booking-header">
                        <span class="guest-name">${escapeHtml(booking.guest_name)}</span>
                        <span class="badge badge-${booking.booking_status}">${booking.booking_status}</span>
                    </div>
                    <div class="booking-detail">
                        <i class="fas fa-phone"></i>
                        <span>${booking.guest_phone || 'No phone'}</span>
                    </div>
                    <div class="booking-detail">
                        <i class="fas fa-building"></i>
                        <span>${escapeHtml(booking.unit_name || 'N/A')}</span>
                    </div>
                    <div class="booking-detail">
                        <i class="fas fa-calendar-alt"></i>
                        <span><strong>${formatDate(booking.check_in_date)}</strong> → <strong>${formatDate(booking.check_out_date)}</strong> (${booking.total_nights || '?'} nights)</span>
                    </div>
                    <div class="booking-detail">
                        <i class="fas fa-dollar-sign"></i>
                        <span><strong>${booking.currency === 'MVR' ? 'MVR' : '$'}${parseFloat(booking.total_amount || 0).toFixed(2)}</strong></span>
                    </div>
                    <div class="action-buttons">
                        ${getActionButtons(booking)}
                    </div>
                </div>
            `).join('');
        }
        
        function getActionButtons(booking) {
            if (booking.booking_status === 'pending') {
                return `
                    <button class="btn-sm btn-confirm" onclick="confirmBooking(${booking.id})">Confirm</button>
                    <button class="btn-sm btn-cancel" onclick="cancelBooking(${booking.id})">Cancel</button>
                `;
            } else if (booking.booking_status === 'confirmed') {
                return `<button class="btn-sm btn-cancel" onclick="cancelBooking(${booking.id})">Cancel</button>`;
            } else {
                return `<button class="btn-sm btn-delete" onclick="deleteBooking(${booking.id})">Delete</button>`;
            }
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '—';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }
        
        async function confirmBooking(id) {
            if (!confirm('Confirm this booking?')) return;
            try {
                const res = await fetch(`${API_BASE_URL}/admin/bookings/${id}/status`, {
                    method: 'PATCH',
                    headers: authHeaders(),
                    body: JSON.stringify({ status: 'confirmed' })
                });
                if (res.ok) {
                    showMessage('Booking confirmed', 'success');
                    loadAllBookings();
                } else {
                    showMessage('Failed to confirm', 'error');
                }
            } catch(e) {
                showMessage('Error', 'error');
            }
        }
        
        async function cancelBooking(id) {
            if (!confirm('Cancel this booking?')) return;
            try {
                const res = await fetch(`${API_BASE_URL}/admin/bookings/${id}/status`, {
                    method: 'PATCH',
                    headers: authHeaders(),
                    body: JSON.stringify({ status: 'cancelled' })
                });
                if (res.ok) {
                    showMessage('Booking cancelled', 'success');
                    loadAllBookings();
                } else {
                    showMessage('Failed to cancel', 'error');
                }
            } catch(e) {
                showMessage('Error', 'error');
            }
        }
        
        async function deleteBooking(id) {
            if (!confirm('Permanently delete this booking? This cannot be undone.')) return;
            try {
                const res = await fetch(`${API_BASE_URL}/admin/bookings/${id}`, {
                    method: 'DELETE',
                    headers: authHeaders()
                });
                if (res.ok) {
                    showMessage('Booking deleted', 'success');
                    loadAllBookings();
                } else {
                    showMessage('Failed to delete', 'error');
                }
            } catch(e) {
                showMessage('Error', 'error');
            }
        }
        
        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = `message ${type}`;
            setTimeout(() => {
                el.style.display = 'none';
                el.className = 'message';
            }, 3000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }
        
        loadAllBookings();
    </script>
</body>
</html>
