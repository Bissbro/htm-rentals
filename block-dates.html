<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>HTM Rentals | Block Dates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #F8F9FA;
            padding: 20px;
        }
        :root {
            --navy: #0A2540;
            --ocean: #006994;
            --turquoise: #40B5AD;
            --white: #FFFFFF;
            --gray-light: #F8F9FA;
            --gray-border: #E5E5E5;
            --gray-text: #6C757D;
            --radius-lg: 20px;
            --radius-md: 12px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
        }
        .container { max-width: 800px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--gray-border);
        }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--navy); }
        .back-link { color: var(--ocean); text-decoration: none; font-size: 1rem; }
        
        .card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--navy);
        }
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: white;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .calendar-nav button {
            background: var(--gray-light);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }
        .calendar-nav button:hover { background: var(--turquoise); color: white; }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        .calendar-weekday {
            font-weight: 600;
            padding: 10px 0;
            font-size: 12px;
            color: var(--gray-text);
        }
        .calendar-day {
            padding: 10px 5px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .calendar-day.available:hover { background: var(--turquoise); color: white; }
        .calendar-day.booked {
            background: var(--gray-light);
            color: var(--gray-text);
            text-decoration: line-through;
            cursor: not-allowed;
        }
        .calendar-day.selected {
            background: var(--ocean);
            color: white;
        }
        .calendar-day.today {
            border: 2px solid var(--turquoise);
            font-weight: 600;
        }
        .calendar-day.empty { cursor: default; background: transparent; }
        
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--gray-border);
            font-size: 12px;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            display: inline-block;
            margin-right: 6px;
        }
        
        .selected-preview {
            background: var(--gray-light);
            padding: 16px;
            border-radius: var(--radius-md);
            margin: 20px 0;
            text-align: center;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--turquoise); color: white; }
        .btn-primary:hover { background: var(--ocean); }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        
        .blocked-list { margin-top: 20px; }
        .blocked-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--gray-border);
        }
        
        .message {
            padding: 14px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            display: none;
        }
        .message.success { background: #D4EDDA; color: #155724; display: block; }
        .message.error { background: #F8D7DA; color: #721C24; display: block; }
        
        .loading { text-align: center; padding: 40px; color: var(--gray-text); }
        
        @media (max-width: 600px) {
            body { padding: 12px; }
            .card { padding: 16px; }
            .calendar-day { padding: 8px 3px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Block Dates</h1>
            <a href="admin.html" class="back-link">← Back to Admin</a>
        </div>
        
        <div class="card">
            <div class="form-group">
                <label>Select Unit</label>
                <select id="unit-select">
                    <option value="">-- Select Unit --</option>
                </select>
            </div>
        </div>
        
        <div id="calendar-card" class="card" style="display: none;">
            <div class="calendar-header">
                <h3 id="calendar-month-year">January 2026</h3>
                <div class="calendar-nav">
                    <button id="prev-month"><i class="fas fa-chevron-left"></i></button>
                    <button id="next-month"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
            <div class="legend">
                <div><span class="legend-color" style="background:white; border:2px solid var(--turquoise);"></span> Available</div>
                <div><span class="legend-color" style="background:var(--gray-light);"></span> Booked/Blocked</div>
                <div><span class="legend-color" style="background:var(--ocean);"></span> Selected</div>
            </div>
            
            <div id="selected-preview" class="selected-preview" style="display: none;">
                <strong>Selected to block:</strong> <span id="selected-dates-text"></span>
            </div>
            
            <div class="action-buttons">
                <button id="block-btn" class="btn btn-primary">Block Selected Dates</button>
                <button id="clear-btn" class="btn btn-danger">Clear Selection</button>
            </div>
        </div>
        
        <div id="blocked-card" class="card" style="display: none;">
            <h3>Currently Blocked Dates</h3>
            <div id="blocked-list" class="blocked-list">
                <div class="loading">Select a unit to view blocked dates</div>
            </div>
        </div>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        const API_BASE_URL = 'https://api.htmrentals.com/api';
        
        let allUnits = [];
        let selectedUnitId = null;
        let bookedDates = [];      // Dates from bookings
        let blockedDates = [];     // Dates from unit_availability (is_available=0)
        let selectedDates = [];
        let startDate = null;
        let endDate = null;
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        
        async function loadUnits() {
            try {
                const res = await fetch(`${API_BASE_URL}/admin/units`, {
                    headers: { 'Authorization': 'Bearer admin-secret-token' }
                });
                const data = await res.json();
                if (data.success) {
                    allUnits = data.units;
                    const select = document.getElementById('unit-select');
                    select.innerHTML = '<option value="">-- Select Unit --</option>' + 
                        allUnits.map(u => `<option value="${u.id}">${escapeHtml(u.unit_name)}</option>`).join('');
                }
            } catch(e) {
                showMessage('Failed to load units', 'error');
            }
        }
        
        async function loadAvailability(unitId) {
            if (!unitId) return;
            try {
                const res = await fetch(`${API_BASE_URL}/bookings/availability?unit_id=${unitId}`);
                const data = await res.json();
                if (data.success) {
                    // Get booked dates from bookings
                    bookedDates = [];
                    if (data.bookings) {
                        data.bookings.forEach(booking => {
                            const start = new Date(booking.check_in_date);
                            const end = new Date(booking.check_out_date);
                            for (let d = new Date(start); d < end; d.setDate(d.getDate() + 1)) {
                                bookedDates.push(d.toISOString().split('T')[0]);
                            }
                        });
                    }
                    
                    // Get blocked dates from unit_availability
                    blockedDates = [];
                    if (data.blocked_dates) {
                        blockedDates = data.blocked_dates.map(b => b.date || b.blocked_date);
                    }
                    
                    renderCalendar();
                    renderBlockedList();
                }
            } catch(e) {
                console.error(e);
                showMessage('Failed to load availability', 'error');
            }
        }
        
        function renderCalendar() {
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            let html = '';
            const weekdays = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
            weekdays.forEach(day => html += `<div class="calendar-weekday">${day}</div>`);
            
            for (let i = 0; i < firstDay; i++) html += '<div class="calendar-day empty"></div>';
            
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isBooked = bookedDates.includes(dateStr);
                const isBlocked = blockedDates.includes(dateStr);
                const isUnavailable = isBooked || isBlocked;
                const isToday = dateStr === todayStr;
                
                let isSelected = false;
                if (startDate && endDate) {
                    if (dateStr === startDate || dateStr === endDate) {
                        isSelected = true;
                    } else if (dateStr > startDate && dateStr < endDate) {
                        isSelected = true;
                    }
                } else if (startDate && dateStr === startDate) {
                    isSelected = true;
                }
                
                let classes = 'calendar-day';
                if (isUnavailable) {
                    classes += ' booked';
                } else {
                    classes += ' available';
                }
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                
                html += `<div class="${classes}" data-date="${dateStr}" onclick="selectDate('${dateStr}', ${isUnavailable})">${d}</div>`;
            }
            
            document.getElementById('calendar-grid').innerHTML = html;
            document.getElementById('calendar-month-year').textContent = `${monthNames[currentMonth]} ${currentYear}`;
            updateSelectedPreview();
        }
        
        function selectDate(dateStr, isUnavailable) {
            if (isUnavailable) {
                showMessage('This date is already booked or blocked', 'error');
                return;
            }
            
            if (!startDate || (startDate && endDate)) {
                startDate = dateStr;
                endDate = null;
            } else if (startDate && !endDate) {
                if (dateStr < startDate) {
                    startDate = dateStr;
                } else {
                    endDate = dateStr;
                }
            }
            
            renderCalendar();
        }
        
        function updateSelectedPreview() {
            const preview = document.getElementById('selected-preview');
            const textSpan = document.getElementById('selected-dates-text');
            
            if (!startDate) {
                preview.style.display = 'none';
                return;
            }
            
            if (startDate && !endDate) {
                preview.style.display = 'block';
                textSpan.textContent = startDate;
            } else if (startDate && endDate) {
                preview.style.display = 'block';
                const nights = Math.ceil((new Date(endDate) - new Date(startDate)) / (1000 * 60 * 60 * 24)) + 1;
                textSpan.textContent = `${startDate} to ${endDate} (${nights} nights)`;
            }
        }
        
        function clearSelection() {
            startDate = null;
            endDate = null;
            renderCalendar();
        }
        
        async function blockSelected() {
            if (!selectedUnitId) {
                showMessage('Please select a unit', 'error');
                return;
            }
            if (!startDate) {
                showMessage('Please select dates to block', 'error');
                return;
            }
            
            let blockStart = startDate;
            let blockEnd = endDate ? endDate : startDate;
            
            try {
                const res = await fetch(`${API_BASE_URL}/admin/block-dates`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer admin-secret-token'
                    },
                    body: JSON.stringify({
                        start_date: blockStart,
                        end_date: blockEnd,
                        reason: 'Manually blocked',
                        unit_id: selectedUnitId
                    })
                });
                
                if (res.ok) {
                    showMessage(`Blocked ${blockStart} to ${blockEnd}`, 'success');
                    clearSelection();
                    await loadAvailability(selectedUnitId);
                } else {
                    showMessage('Failed to block dates', 'error');
                }
            } catch(e) {
                showMessage('Error blocking dates', 'error');
            }
        }
        
        async function unblockDate(dateStr, id) {
            if (!confirm(`Unblock ${dateStr}?`)) return;
            try {
                const res = await fetch(`${API_BASE_URL}/admin/unblock-date/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer admin-secret-token' }
                });
                if (res.ok) {
                    showMessage(`Unblocked ${dateStr}`, 'success');
                    await loadAvailability(selectedUnitId);
                } else {
                    showMessage('Failed to unblock', 'error');
                }
            } catch(e) {
                showMessage('Error', 'error');
            }
        }
        
        async function renderBlockedList() {
            const container = document.getElementById('blocked-list');
            if (!selectedUnitId) {
                container.innerHTML = '<div class="loading">Select a unit to view blocked dates</div>';
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE_URL}/bookings/availability?unit_id=${selectedUnitId}`);
                const data = await res.json();
                if (data.success && data.blocked_dates && data.blocked_dates.length) {
                    const blockedEntries = data.blocked_dates.filter(b => b.date);
                    if (blockedEntries.length === 0) {
                        container.innerHTML = '<p style="text-align:center; color: var(--gray-text);">No blocked dates for this unit</p>';
                    } else {
                        container.innerHTML = blockedEntries.map(b => `
                            <div class="blocked-item">
                                <div><strong>${b.date}</strong> ${b.reason ? `<span style="font-size:12px; color:var(--gray-text);">(${escapeHtml(b.reason)})</span>` : ''}</div>
                                <button class="btn btn-danger btn-sm" onclick="unblockDate('${b.date}', ${b.id})">Unblock</button>
                            </div>
                        `).join('');
                    }
                } else {
                    container.innerHTML = '<p style="text-align:center; color: var(--gray-text);">No blocked dates for this unit</p>';
                }
            } catch(e) {
                container.innerHTML = '<p style="text-align:center; color: var(--gray-text);">Failed to load blocked dates</p>';
            }
        }
        
        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = `message ${type}`;
            setTimeout(() => {
                el.style.display = 'none';
                el.className = 'message';
            }, 3000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }
        
        // Event Listeners
        document.getElementById('unit-select').addEventListener('change', async (e) => {
            selectedUnitId = e.target.value;
            if (selectedUnitId) {
                document.getElementById('calendar-card').style.display = 'block';
                document.getElementById('blocked-card').style.display = 'block';
                startDate = null;
                endDate = null;
                await loadAvailability(selectedUnitId);
            } else {
                document.getElementById('calendar-card').style.display = 'none';
                document.getElementById('blocked-card').style.display = 'none';
            }
        });
        
        document.getElementById('prev-month').addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        });
        
        document.getElementById('next-month').addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        });
        
        document.getElementById('block-btn').addEventListener('click', blockSelected);
        document.getElementById('clear-btn').addEventListener('click', clearSelection);
        
        loadUnits();
    </script>
</body>
</html>
