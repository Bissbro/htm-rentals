<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>HTM Rentals | Block Dates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #F8F9FA;
            padding: 20px;
        }
        :root {
            --navy: #0A2540;
            --ocean: #006994;
            --turquoise: #40B5AD;
            --gray-light: #F8F9FA;
            --gray-border: #E5E5E5;
            --gray-text: #6C757D;
            --danger: #dc3545;
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--gray-border);
            flex-wrap: wrap;
            gap: 16px;
        }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--navy); }
        .back-link { color: var(--ocean); text-decoration: none; font-size: 1rem; }
        
        .card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--navy);
        }
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: white;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .calendar-nav button {
            background: var(--gray-light);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }
        .calendar-nav button:hover { background: var(--turquoise); color: white; }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        .calendar-weekday {
            font-weight: 600;
            padding: 10px 0;
            font-size: 12px;
            color: var(--gray-text);
        }
        .calendar-day {
            padding: 10px 5px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .calendar-day.available:hover { background: var(--turquoise); color: white; }
        .calendar-day.booked {
            background: var(--gray-light);
            color: var(--gray-text);
            text-decoration: line-through;
            cursor: not-allowed;
        }
        .calendar-day.selected {
            background: var(--ocean);
            color: white;
        }
        .calendar-day.today {
            border: 2px solid var(--turquoise);
            font-weight: 600;
        }
        .calendar-day.empty { cursor: default; background: transparent; }
        
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--gray-border);
            font-size: 12px;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            display: inline-block;
            margin-right: 6px;
        }
        
        .selected-preview {
            background: var(--gray-light);
            padding: 16px;
            border-radius: var(--radius-md);
            margin: 20px 0;
            text-align: center;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            flex: 1;
        }
        .btn-primary { background: var(--turquoise); color: white; }
        .btn-primary:hover { background: var(--ocean); }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        
        .blocked-list { margin-top: 20px; }
        .blocked-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--gray-border);
        }
        
        .message {
            padding: 14px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            display: none;
        }
        .message.success { background: #D4EDDA; color: #155724; display: block; }
        .message.error { background: #F8D7DA; color: #721C24; display: block; }
        
        .loading { text-align: center; padding: 40px; color: var(--gray-text); }
        .empty { text-align: center; padding: 40px; color: var(--gray-text); }
        
        @media (max-width: 600px) {
            body { padding: 12px; }
            .card { padding: 16px; }
            .calendar-day { padding: 8px 3px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Block Dates</h1>
            <a href="admin.html" class="back-link">← Back to Admin</a>
        </div>
        
        <div class="card">
            <div class="form-group">
                <label>Select Unit</label>
                <select id="unit-select">
                    <option value="">-- Select Unit --</option>
                </select>
            </div>
        </div>
        
        <div id="calendar-card" class="card" style="display: none;">
            <div class="calendar-header">
                <h3 id="calendar-month-year">January 2026</h3>
                <div class="calendar-nav">
                    <button id="prev-month"><i class="fas fa-chevron-left"></i></button>
                    <button id="next-month"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
            <div class="legend">
                <div><span class="legend-color" style="background:white; border:2px solid var(--turquoise);"></span> Available</div>
                <div><span class="legend-color" style="background:var(--gray-light);"></span> Booked/Blocked</div>
                <div><span class="legend-color" style="background:var(--ocean);"></span> Selected</div>
            </div>
            <div id="selected-preview" class="selected-preview" style="display: none;">
                <strong>Selected to block:</strong> <span id="selected-dates-text"></span>
            </div>
            <div class="action-buttons">
                <button id="block-btn" class="btn btn-primary">Block Selected Dates</button>
                <button id="clear-btn" class="btn btn-danger">Clear Selection</button>
            </div>
        </div>
        
        <div id="blocked-card" class="card" style="display: none;">
            <h3>Currently Blocked Dates</h3>
            <div id="blocked-list" class="blocked-list"><div class="loading">Select a unit to view blocked dates</div></div>
        </div>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        // ==================== AUTHENTICATION CHECK ====================
        if (!sessionStorage.getItem('adminToken')) {
            window.location.href = 'admin.html';
        }
        // ============================================================

        const API_BASE_URL = 'https://api.htmrentals.com/api';
        function getToken() { return sessionStorage.getItem('adminToken'); }
        function authHeaders(extra) { return { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json', ...extra }; }
        function handleAuthError(res) { if (res && res.status === 401) { sessionStorage.removeItem('adminToken'); window.location.href = 'admin.html'; return true; } return false; }
        
        let allUnits = [];
        let selectedUnitId = null;
        let bookedDates = [];
        let blockedDates = [];
        let selectedStartDate = null;
        let selectedEndDate = null;
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const shortMonthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        
        function formatDateShort(dateStr) {
            const d = new Date(dateStr);
            const day = d.getDate();
            const month = shortMonthNames[d.getMonth()];
            const year = d.getFullYear().toString().slice(-2);
            return `${day} ${month} ${year}`;
        }
        
        async function loadUnits() {
            try {
                const res = await fetch(`${API_BASE_URL}/admin/units`, { headers: authHeaders() });
                if (handleAuthError(res)) return;
                const data = await res.json();
                if (data.success) {
                    allUnits = data.units;
                    const select = document.getElementById('unit-select');
                    select.innerHTML = '<option value="">-- Select Unit --</option>' + 
                        allUnits.map(u => `<option value="${u.id}">${escapeHtml(u.unit_name)}</option>`).join('');
                }
            } catch(e) {
                showMessage('Failed to load units', 'error');
            }
        }
        
        async function loadAvailability(unitId) {
            if (!unitId) return;
            try {
                const res = await fetch(`${API_BASE_URL}/bookings/availability?unit_id=${unitId}`, { headers: authHeaders() });
                const data = await res.json();
                if (data.success) {
                    bookedDates = [];
                    if (data.bookings) {
                        data.bookings.forEach(booking => {
                            const start = new Date(booking.check_in_date);
                            const end = new Date(booking.check_out_date);
                            for (let d = new Date(start); d < end; d.setDate(d.getDate() + 1)) {
                                bookedDates.push(d.toISOString().split('T')[0]);
                            }
                        });
                    }
                    
                    blockedDates = [];
                    if (data.blocked_dates) {
                        blockedDates = data.blocked_dates.map(b => {
                            const date = b.blocked_date || b.date;
                            return date ? date.split('T')[0] : null;
                        }).filter(d => d);
                    }
                    
                    renderCalendar();
                    renderBlockedList(data.blocked_dates);
                }
            } catch(e) {
                console.error(e);
                showMessage('Failed to load availability', 'error');
            }
        }
        
        function renderCalendar() {
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            let html = '';
            const weekdays = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
            weekdays.forEach(day => html += `<div class="calendar-weekday">${day}</div>`);
            
            for (let i = 0; i < firstDay; i++) html += '<div class="calendar-day empty"></div>';
            
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isBooked = bookedDates.includes(dateStr);
                const isBlocked = blockedDates.includes(dateStr);
                const isUnavailable = isBooked || isBlocked;
                const isToday = dateStr === todayStr;
                
                let isSelected = false;
                if (selectedStartDate && selectedEndDate) {
                    if (dateStr >= selectedStartDate && dateStr <= selectedEndDate) isSelected = true;
                } else if (selectedStartDate && dateStr === selectedStartDate) isSelected = true;
                
                let classes = 'calendar-day';
                if (isUnavailable) classes += ' booked';
                else classes += ' available';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                
                html += `<div class="${classes}" data-date="${dateStr}" onclick="selectDate('${dateStr}', ${isUnavailable})">${d}</div>`;
            }
            
            document.getElementById('calendar-grid').innerHTML = html;
            document.getElementById('calendar-month-year').textContent = `${monthNames[currentMonth]} ${currentYear}`;
            updateSelectedPreview();
        }
        
        function selectDate(dateStr, isUnavailable) {
            if (isUnavailable) {
                showMessage('This date is already booked or blocked', 'error');
                return;
            }
            
            if (!selectedStartDate || (selectedStartDate && selectedEndDate)) {
                selectedStartDate = dateStr;
                selectedEndDate = null;
            } else if (selectedStartDate && !selectedEndDate) {
                if (dateStr < selectedStartDate) {
                    selectedStartDate = dateStr;
                } else {
                    selectedEndDate = dateStr;
                }
            }
            renderCalendar();
        }
        
        function updateSelectedPreview() {
            const preview = document.getElementById('selected-preview');
            const textSpan = document.getElementById('selected-dates-text');
            if (!selectedStartDate) {
                preview.style.display = 'none';
                return;
            }
            if (selectedStartDate && !selectedEndDate) {
                preview.style.display = 'block';
                textSpan.textContent = formatDateShort(selectedStartDate) + ' (1 night)';
            } else if (selectedStartDate && selectedEndDate) {
                const nights = Math.ceil((new Date(selectedEndDate) - new Date(selectedStartDate)) / (1000 * 60 * 60 * 24)) + 1;
                preview.style.display = 'block';
                textSpan.textContent = `${formatDateShort(selectedStartDate)} to ${formatDateShort(selectedEndDate)} (${nights} nights)`;
            }
        }
        
        function clearSelection() {
            selectedStartDate = null;
            selectedEndDate = null;
            renderCalendar();
        }
        
        async function blockSelected() {
            if (!selectedUnitId) { showMessage('Please select a unit', 'error'); return; }
            if (!selectedStartDate) { showMessage('Please select dates to block', 'error'); return; }
            
            const blockStart = selectedStartDate;
            const blockEnd = selectedEndDate ? selectedEndDate : selectedStartDate;
            
            try {
                const res = await fetch(`${API_BASE_URL}/admin/block-dates`, {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ start_date: blockStart, end_date: blockEnd, reason: 'Manually blocked', unit_id: selectedUnitId })
                });
                const result = await res.json();
                if (result.success) {
                    const nights = Math.ceil((new Date(blockEnd) - new Date(blockStart)) / (1000 * 60 * 60 * 24)) + 1;
                    showMessage(`✓ Blocked ${formatDateShort(blockStart)} to ${formatDateShort(blockEnd)} (${nights} nights)`, 'success');
                    selectedStartDate = null;
                    selectedEndDate = null;
                    await loadAvailability(selectedUnitId);
                } else {
                    showMessage(result.error || 'Failed to block dates', 'error');
                }
            } catch(e) { showMessage('Error: ' + e.message, 'error'); }
        }
        
        async function unblockRange(startDate, endDate, firstEntryId) {
            if (!confirm(`Unblock ${formatDateShort(startDate)} to ${formatDateShort(endDate)}?`)) return;
            
            try {
                const res = await fetch(`${API_BASE_URL}/bookings/availability?unit_id=${selectedUnitId}`, { headers: authHeaders() });
                const data = await res.json();
                if (data.success && data.blocked_dates) {
                    const rangeDates = [];
                    const current = new Date(startDate);
                    const end = new Date(endDate);
                    while (current <= end) {
                        rangeDates.push(current.toISOString().split('T')[0]);
                        current.setDate(current.getDate() + 1);
                    }
                    
                    const idsToDelete = data.blocked_dates
                        .filter(b => {
                            const date = (b.blocked_date || b.date).split('T')[0];
                            return rangeDates.includes(date);
                        })
                        .map(b => b.id);
                    
                    let deletedCount = 0;
                    for (const id of idsToDelete) {
                        const deleteRes = await fetch(`${API_BASE_URL}/admin/unblock-date/${id}`, {
                            method: 'DELETE',
                            headers: authHeaders()
                        });
                        if (deleteRes.ok) deletedCount++;
                    }
                    
                    if (deletedCount > 0) {
                        showMessage(`✓ Unblocked ${formatDateShort(startDate)} to ${formatDateShort(endDate)}`, 'success');
                        await loadAvailability(selectedUnitId);
                    } else {
                        showMessage('Failed to unblock', 'error');
                    }
                }
            } catch(e) {
                showMessage('Error', 'error');
            }
        }
        
        async function renderBlockedList(blockedDatesData) {
            const container = document.getElementById('blocked-list');
            if (!selectedUnitId) {
                container.innerHTML = '<div class="loading">Select a unit to view blocked dates</div>';
                return;
            }
            
            if (!blockedDatesData || blockedDatesData.length === 0) {
                container.innerHTML = '<p style="text-align:center; color: var(--gray-text);">No blocked dates for this unit</p>';
                return;
            }
            
            const unitBlocked = blockedDatesData.filter(b => b.unit_id == selectedUnitId);
            if (unitBlocked.length === 0) {
                container.innerHTML = '<p style="text-align:center; color: var(--gray-text);">No blocked dates for this unit</p>';
                return;
            }
            
            const dates = unitBlocked.map(b => (b.blocked_date || b.date).split('T')[0]).sort();
            
            const ranges = [];
            let rangeStart = dates[0];
            let rangeEnd = dates[0];
            
            for (let i = 1; i < dates.length; i++) {
                const prev = new Date(dates[i-1]);
                const curr = new Date(dates[i]);
                const diffDays = (curr - prev) / (1000 * 60 * 60 * 24);
                if (diffDays === 1) {
                    rangeEnd = dates[i];
                } else {
                    ranges.push({ start: rangeStart, end: rangeEnd });
                    rangeStart = dates[i];
                    rangeEnd = dates[i];
                }
            }
            ranges.push({ start: rangeStart, end: rangeEnd });
            
            container.innerHTML = ranges.map(range => {
                const displayStart = formatDateShort(range.start);
                const displayEnd = formatDateShort(range.end);
                const isSingle = range.start === range.end;
                const displayText = isSingle ? displayStart : `${displayStart} to ${displayEnd}`;
                const firstEntry = unitBlocked.find(b => (b.blocked_date || b.date).split('T')[0] === range.start);
                
                return `
                    <div class="blocked-item">
                        <div><strong>${displayText}</strong></div>
                        <button class="btn btn-danger" style="padding: 6px 12px; font-size: 12px;" onclick="unblockRange('${range.start}', '${range.end}', ${firstEntry.id})">Unblock</button>
                    </div>
                `;
            }).join('');
        }
        
        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = `message ${type}`;
            setTimeout(() => { el.style.display = 'none'; el.className = 'message'; }, 3000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }
        
        document.getElementById('unit-select').addEventListener('change', async (e) => {
            selectedUnitId = e.target.value;
            if (selectedUnitId) {
                document.getElementById('calendar-card').style.display = 'block';
                document.getElementById('blocked-card').style.display = 'block';
                selectedStartDate = null;
                selectedEndDate = null;
                await loadAvailability(selectedUnitId);
            } else {
                document.getElementById('calendar-card').style.display = 'none';
                document.getElementById('blocked-card').style.display = 'none';
            }
        });
        
        document.getElementById('prev-month').addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        });
        
        document.getElementById('next-month').addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        });
        
        document.getElementById('block-btn').addEventListener('click', blockSelected);
        document.getElementById('clear-btn').addEventListener('click', clearSelection);
        
        window.unblockRange = unblockRange;
        
        loadUnits();
    </script>
</body>
</html>
