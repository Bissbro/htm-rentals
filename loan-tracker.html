<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTM Rentals | Loan Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F4F7FB; color: #0A2540; min-height: 100vh; }
        .header { background: #0A2540; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
        .header a { color: white; text-decoration: none; font-size: 20px; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .container { max-width: 700px; margin: 0 auto; padding: 20px 16px 100px; }

        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card-title { font-size: 15px; font-weight: 700; color: #0A2540; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .card-title i { color: #40B5AD; }

        /* Loan summary */
        .loan-summary { background: linear-gradient(135deg, #0A2540, #006994); border-radius: 16px; padding: 24px; margin-bottom: 16px; color: white; }
        .loan-name { font-size: 13px; opacity: 0.7; margin-bottom: 4px; }
        .loan-balance { font-size: 32px; font-weight: 800; margin-bottom: 16px; }
        .loan-progress-bar { background: rgba(255,255,255,0.2); border-radius: 10px; height: 8px; margin-bottom: 8px; }
        .loan-progress-fill { background: #40B5AD; border-radius: 10px; height: 100%; transition: width 0.5s; }
        .loan-meta { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.7; }
        .loan-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
        .loan-stat { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; }
        .loan-stat-label { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
        .loan-stat-value { font-size: 16px; font-weight: 700; }

        /* Partner savings */
        .partner-savings { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .partner-saving-card { background: #f8f9fa; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
        .partner-saving-name { font-size: 14px; font-weight: 700; color: #0A2540; margin-bottom: 2px; }
        .partner-saving-detail { font-size: 12px; color: #888; }
        .partner-saving-balance { text-align: right; }
        .partner-saving-amount { font-size: 18px; font-weight: 800; color: #40B5AD; }
        .partner-saving-label { font-size: 11px; color: #888; }
        .withdraw-btn { background: white; border: 1.5px solid #40B5AD; color: #40B5AD; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 6px; }

        /* Payment log */
        .payment-item { padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
        .payment-item:last-child { border-bottom: none; }
        .payment-date { font-size: 12px; color: #888; margin-bottom: 4px; }
        .payment-amount { font-size: 16px; font-weight: 700; color: #0A2540; margin-bottom: 6px; }
        .payment-contributions { display: flex; gap: 8px; flex-wrap: wrap; }
        .contribution-tag { background: #f0fafa; color: #006994; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; border: 1px solid #40B5AD; }
        .delete-payment { float: right; background: none; border: none; color: #ddd; cursor: pointer; font-size: 14px; }
        .delete-payment:hover { color: #dc3545; }

        /* Buttons */
        .fab { position: fixed; bottom: 24px; right: 20px; background: #40B5AD; color: white; border: none; width: 56px; height: 56px; border-radius: 50%; font-size: 22px; cursor: pointer; box-shadow: 0 4px 20px rgba(64,181,173,0.4); display: flex; align-items: center; justify-content: center; z-index: 99; }
        .btn { padding: 11px 20px; border-radius: 40px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #0A2540; color: white; width: 100%; padding: 14px; border-radius: 40px; font-size: 15px; margin-top: 8px; }
        .btn-outline { background: white; color: #006994; border: 1.5px solid #006994; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,37,64,0.7); z-index: 9999; align-items: flex-end; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 24px 24px 0 0; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 24px 20px; }
        .modal-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 20px; }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select { width: 100%; padding: 11px 14px; border: 1.5px solid #E0E0E0; border-radius: 10px; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: #40B5AD; }
        .contribution-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
        .contribution-name { font-size: 14px; font-weight: 600; }
        .contribution-input { width: 130px; padding: 8px 12px; border: 1.5px solid #E0E0E0; border-radius: 8px; font-size: 14px; text-align: right; }
        .total-row { display: flex; justify-content: space-between; padding: 12px 0; font-weight: 700; color: #0A2540; border-top: 2px solid #0A2540; margin-top: 8px; }
        .remaining-label { font-size: 13px; color: #888; text-align: center; margin-bottom: 12px; }
        
        .toast { display: none; position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #0A2540; color: white; padding: 12px 24px; border-radius: 40px; font-size: 14px; font-weight: 600; z-index: 99999; }
        .empty { text-align: center; padding: 24px; color: #aaa; font-size: 14px; }
        .section-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab { padding: 8px 16px; border-radius: 40px; border: 1.5px solid #eee; background: white; font-size: 13px; font-weight: 600; color: #666; cursor: pointer; }
        .tab.active { border-color: #40B5AD; background: #40B5AD; color: white; }
    </style>
</head>
<body>

<div class="header">
    <a href="partners.html"><i class="fas fa-arrow-left"></i></a>
    <h1>Loan & Savings Tracker</h1>
</div>

<div class="container">
    <!-- Loan Summary -->
    <div class="loan-summary" id="loan-summary">
        <div class="loan-name">Business Refinance Loan</div>
        <div class="loan-balance" id="loan-balance">Loading...</div>
        <div class="loan-progress-bar"><div class="loan-progress-fill" id="loan-progress"></div></div>
        <div class="loan-meta">
            <span id="loan-paid">MVR 0 paid</span>
            <span id="loan-total">of MVR 196,000</span>
        </div>
        <div class="loan-stats">
            <div class="loan-stat">
                <div class="loan-stat-label">Monthly Payment</div>
                <div class="loan-stat-value">MVR 9,700</div>
            </div>
            <div class="loan-stat">
                <div class="loan-stat-label">Months Remaining</div>
                <div class="loan-stat-value" id="months-remaining">—</div>
            </div>
        </div>
    </div>

    <!-- Partner Savings -->
    <div class="card">
        <div class="card-title"><i class="fas fa-piggy-bank"></i> Partner Savings</div>
        <div class="partner-savings" id="partner-savings">Loading...</div>
    </div>

    <!-- Tabs -->
    <div class="section-tabs">
        <div class="tab active" onclick="showTab('payments')">Payment Log</div>
        <div class="tab" onclick="showTab('withdrawals')">Withdrawals</div>
    </div>

    <!-- Payment Log -->
    <div class="card" id="payments-section">
        <div class="card-title"><i class="fas fa-receipt"></i> Payment History</div>
        <div id="payment-list"></div>
    </div>

    <!-- Withdrawals -->
    <div class="card" id="withdrawals-section" style="display:none;">
        <div class="card-title"><i class="fas fa-hand-holding-usd"></i> Withdrawals</div>
        <div id="withdrawal-list"></div>
    </div>
</div>

<button class="fab" onclick="openPaymentModal()"><i class="fas fa-plus"></i></button>

<!-- Payment Modal -->
<div class="modal-overlay" id="payment-modal">
    <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-title">Record Payment</div>
        <div class="form-group">
            <label>Payment Date</label>
            <input type="date" id="pay-date">
        </div>
        <div class="form-group">
            <label>Notes (optional)</label>
            <input type="text" id="pay-notes" placeholder="e.g., May 2026 payment">
        </div>
        <div class="form-group">
            <label>Contributions</label>
            <div id="contribution-rows"></div>
            <div class="total-row">
                <span>Total</span>
                <span id="contribution-total">MVR 0</span>
            </div>
            <div class="remaining-label" id="remaining-label"></div>
        </div>
        <button class="btn btn-primary" onclick="savePayment()">Record Payment</button>
        <button onclick="closePaymentModal()" style="width:100%;padding:12px;background:none;border:none;color:#888;font-size:14px;cursor:pointer;margin-top:8px;">Cancel</button>
    </div>
</div>

<!-- Withdrawal Modal -->
<div class="modal-overlay" id="withdrawal-modal">
    <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-title">Record Withdrawal</div>
        <div class="form-group">
            <label>Partner</label>
            <select id="w-partner"></select>
        </div>
        <div class="form-group">
            <label>Amount (MVR)</label>
            <input type="number" id="w-amount" placeholder="0">
        </div>
        <div class="form-group">
            <label>Date</label>
            <input type="date" id="w-date">
        </div>
        <div class="form-group">
            <label>Notes</label>
            <input type="text" id="w-notes" placeholder="Reason for withdrawal">
        </div>
        <button class="btn btn-primary" onclick="saveWithdrawal()">Record Withdrawal</button>
        <button onclick="closeWithdrawalModal()" style="width:100%;padding:12px;background:none;border:none;color:#888;font-size:14px;cursor:pointer;margin-top:8px;">Cancel</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://api.htmrentals.com/api';
let data = {};

function getToken() { return sessionStorage.getItem('adminToken'); }
function authHeaders() { return { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' }; }

async function init() {
    if (!getToken()) { window.location.href = 'admin.html'; return; }
    await loadData();
}

async function loadData() {
    try {
        const res = await fetch(`${API}/admin/loans`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
        data = await res.json();
        if (data.success) {
            renderLoanSummary();
            renderPartnerSavings();
            renderPayments();
            renderWithdrawals();
        }
    } catch(e) { showToast('Error loading data'); }
}

function renderLoanSummary() {
    const loan = data.loans[0];
    if (!loan) return;
    const remaining = parseFloat(loan.remaining_balance);
    const total = parseFloat(loan.total_amount);
    const paid = total - remaining;
    const pct = (paid / total * 100).toFixed(1);
    const monthsLeft = Math.ceil(remaining / loan.monthly_payment);

    document.getElementById('loan-balance').textContent = `MVR ${remaining.toLocaleString('en-US', {minimumFractionDigits:2})} remaining`;
    document.getElementById('loan-progress').style.width = pct + '%';
    document.getElementById('loan-paid').textContent = `MVR ${paid.toLocaleString('en-US', {minimumFractionDigits:0})} paid (${pct}%)`;
    document.getElementById('loan-total').textContent = `of MVR ${total.toLocaleString('en-US', {minimumFractionDigits:0})}`;
    document.getElementById('months-remaining').textContent = monthsLeft + ' months';
}

function renderPartnerSavings() {
    const container = document.getElementById('partner-savings');
    if (!data.savings || !data.savings.length) {
        container.innerHTML = '<div class="empty">No partner data</div>';
        return;
    }
    container.innerHTML = data.savings.map(s => `
        <div class="partner-saving-card">
            <div>
                <div class="partner-saving-name">${s.name}</div>
                <div class="partner-saving-detail">Injected: MVR ${s.total_injected.toLocaleString('en-US', {minimumFractionDigits:2})}</div>
                <div class="partner-saving-detail">Withdrawn: MVR ${s.total_withdrawn.toLocaleString('en-US', {minimumFractionDigits:2})}</div>
                <button class="withdraw-btn" onclick="openWithdrawalModal(${s.partner_id}, '${s.name}', ${s.balance})">
                    <i class="fas fa-arrow-down"></i> Withdraw
                </button>
            </div>
            <div class="partner-saving-balance">
                <div class="partner-saving-amount">MVR ${s.balance.toLocaleString('en-US', {minimumFractionDigits:2})}</div>
                <div class="partner-saving-label">Available</div>
            </div>
        </div>
    `).join('');
}

function renderPayments() {
    const container = document.getElementById('payment-list');
    if (!data.payments || !data.payments.length) {
        container.innerHTML = '<div class="empty">No payments recorded yet</div>';
        return;
    }
    container.innerHTML = data.payments.map(p => {
        const contribs = data.contributions.filter(c => c.loan_payment_id == p.id);
        const date = new Date(p.payment_date).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
        return `<div class="payment-item">
            <button class="delete-payment" onclick="deletePayment(${p.id})"><i class="fas fa-trash"></i></button>
            <div class="payment-date">${date} ${p.notes ? '· ' + p.notes : ''}</div>
            <div class="payment-amount">MVR ${parseFloat(p.total_amount).toLocaleString('en-US', {minimumFractionDigits:2})}</div>
            <div class="payment-contributions">
                ${contribs.map(c => `<span class="contribution-tag">${c.partner_name}: MVR ${parseFloat(c.amount).toLocaleString('en-US', {minimumFractionDigits:0})}</span>`).join('')}
            </div>
        </div>`;
    }).join('');
}

function renderWithdrawals() {
    const container = document.getElementById('withdrawal-list');
    if (!data.withdrawals || !data.withdrawals.length) {
        container.innerHTML = '<div class="empty">No withdrawals yet</div>';
        return;
    }
    container.innerHTML = data.withdrawals.map(w => {
        const date = new Date(w.withdrawal_date).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
        return `<div class="payment-item">
            <div class="payment-date">${date}</div>
            <div class="payment-amount" style="color:#dc3545;">- MVR ${parseFloat(w.amount).toLocaleString('en-US', {minimumFractionDigits:2})}</div>
            <div class="payment-contributions"><span class="contribution-tag">${w.partner_name} ${w.notes ? '· ' + w.notes : ''}</span></div>
        </div>`;
    }).join('');
}

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('payments-section').style.display = tab === 'payments' ? 'block' : 'none';
    document.getElementById('withdrawals-section').style.display = tab === 'withdrawals' ? 'block' : 'none';
}

function openPaymentModal() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('pay-date').value = today;
    document.getElementById('pay-notes').value = '';

    // Build contribution rows
    const rows = document.getElementById('contribution-rows');
    rows.innerHTML = data.partners.map(p => `
        <div class="contribution-row">
            <div class="contribution-name">${p.name}</div>
            <input type="number" class="contribution-input" id="contrib-${p.id}" 
                placeholder="0" min="0" step="100" oninput="updateTotal()">
        </div>
    `).join('');
    updateTotal();
    document.getElementById('payment-modal').classList.add('open');
}

function updateTotal() {
    let total = 0;
    data.partners.forEach(p => {
        const val = parseFloat(document.getElementById(`contrib-${p.id}`)?.value) || 0;
        total += val;
    });
    document.getElementById('contribution-total').textContent = `MVR ${total.toLocaleString('en-US', {minimumFractionDigits:2})}`;
    const diff = 9700 - total;
    if (diff > 0) document.getElementById('remaining-label').textContent = `MVR ${diff.toLocaleString()} still needed to reach MVR 9,700`;
    else if (diff < 0) document.getElementById('remaining-label').textContent = `MVR ${Math.abs(diff).toLocaleString()} over monthly target`;
    else document.getElementById('remaining-label').textContent = '✓ Exactly covers monthly payment';
}

function closePaymentModal() { document.getElementById('payment-modal').classList.remove('open'); }

async function savePayment() {
    const contributions = data.partners.map(p => ({
        partner_id: p.id,
        amount: parseFloat(document.getElementById(`contrib-${p.id}`)?.value) || 0
    })).filter(c => c.amount > 0);

    const total = contributions.reduce((sum, c) => sum + c.amount, 0);
    if (total <= 0) { showToast('Please enter at least one contribution'); return; }

    try {
        const res = await fetch(`${API}/admin/loans/payment`, {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({
                loan_id: data.loans[0].id,
                payment_date: document.getElementById('pay-date').value,
                total_amount: total,
                notes: document.getElementById('pay-notes').value,
                contributions
            })
        });
        const result = await res.json();
        if (result.success) {
            showToast('Payment recorded!');
            closePaymentModal();
            await loadData();
        } else { showToast('Error: ' + result.error); }
    } catch(e) { showToast('Error saving payment'); }
}

async function deletePayment(id) {
    if (!confirm('Delete this payment? Loan balance will be restored.')) return;
    try {
        const res = await fetch(`${API}/admin/loans/payment/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${getToken()}` } });
        const result = await res.json();
        if (result.success) { showToast('Payment deleted'); await loadData(); }
    } catch(e) { showToast('Error deleting payment'); }
}

function openWithdrawalModal(partnerId, name, balance) {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('w-date').value = today;
    document.getElementById('w-amount').value = '';
    document.getElementById('w-notes').value = '';
    const select = document.getElementById('w-partner');
    select.innerHTML = data.partners.map(p => `<option value="${p.id}" ${p.id == partnerId ? 'selected' : ''}>${p.name} (Available: MVR ${data.savings.find(s=>s.partner_id==p.id)?.balance.toLocaleString('en-US',{minimumFractionDigits:2})||0})</option>`).join('');
    document.getElementById('withdrawal-modal').classList.add('open');
}

function closeWithdrawalModal() { document.getElementById('withdrawal-modal').classList.remove('open'); }

async function saveWithdrawal() {
    const partner_id = document.getElementById('w-partner').value;
    const amount = parseFloat(document.getElementById('w-amount').value);
    if (!amount || amount <= 0) { showToast('Please enter a valid amount'); return; }
    const savings = data.savings.find(s => s.partner_id == partner_id);
    if (savings && amount > savings.balance) { showToast(`Cannot withdraw more than MVR ${savings.balance.toLocaleString()}`); return; }
    try {
        const res = await fetch(`${API}/admin/loans/withdrawal`, {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({ partner_id, amount, withdrawal_date: document.getElementById('w-date').value, notes: document.getElementById('w-notes').value })
        });
        const result = await res.json();
        if (result.success) { showToast('Withdrawal recorded!'); closeWithdrawalModal(); await loadData(); }
    } catch(e) { showToast('Error recording withdrawal'); }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3500);
}

init();
</script>
</body>
</html>
