<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTM Rentals | Unit Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }
        .unit-name {
            font-size: 24px;
            font-weight: 700;
            color: #006994;
        }
        .unit-price {
            font-size: 28px;
            font-weight: 700;
            color: #006994;
            margin: 15px 0;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #006994;
            text-decoration: none;
        }
        .error {
            color: red;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div class="loading">Loading unit details...</div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const unitId = urlParams.get('id');
        const currency = urlParams.get('currency') || 'USD';

        async function loadUnit() {
            if (!unitId) {
                document.getElementById('content').innerHTML = '<div class="error">No unit selected. <a href="index.html">Go back</a></div>';
                return;
            }

            try {
                const response = await fetch(`https://api.htmrentals.com/api/units/${unitId}`);
                const data = await response.json();

                if (data.success && data.unit) {
                    const unit = data.unit;
                    const price = currency === 'MVR' ? `MVR ${unit.rate_mvr}` : `$${unit.rate_usd}`;
                    
                    document.getElementById('content').innerHTML = `
                        <a href="index.html" class="back-link">← Back to Units</a>
                        <h1 class="unit-name">${unit.unit_name}</h1>
                        <div class="unit-price">${price} <span style="font-size: 16px;">/night</span></div>
                        <div style="margin: 15px 0;">
                            <span>👥 ${unit.max_guests} guests</span> &nbsp;|&nbsp;
                            <span>🛏️ ${unit.bedrooms} bed</span> &nbsp;|&nbsp;
                            <span>🚿 ${unit.bathrooms} bath</span>
                        </div>
                        <p>${unit.description || 'Comfortable apartment with all essential amenities.'}</p>
                        <hr>
                        <p><strong>Currency:</strong> ${currency === 'MVR' ? 'MVR (Local Package)' : 'USD (Foreign Guest)'}</p>
                        <p><strong>Booking:</strong> Contact us at <a href="https://wa.me/9609373113">WhatsApp</a> or call 9373113</p>
                        <a href="index.html" class="back-link" style="margin-top: 20px;">← Back to Units</a>
                    `;
                } else {
                    document.getElementById('content').innerHTML = '<div class="error">Unit not found. <a href="index.html">Go back</a></div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = '<div class="error">Failed to load unit. Please check your connection. <a href="index.html">Go back</a></div>';
            }
        }

        loadUnit();
    </script>
</body>
</html>
