<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>HTM Rentals | Unit Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo img { height: 35px; }
        .logo span { font-family: 'Poppins', sans-serif; font-size: 1.2rem; font-weight: 700; color: #006994; }
        .logo span span { color: #FF6B6B; }
        .back-link { color: #006994; text-decoration: none; font-weight: 500; }
        
        /* Cards */
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .unit-name { font-size: 28px; font-weight: 700; color: #006994; margin-bottom: 10px; }
        .prices { display: flex; gap: 20px; flex-wrap: wrap; margin: 15px 0; }
        .price-card { background: #e8f4f8; padding: 10px 20px; border-radius: 8px; }
        .price-card .currency { font-size: 12px; color: #6c757d; }
        .price-card .amount { font-size: 24px; font-weight: 700; color: #006994; }
        .features { display: flex; flex-wrap: wrap; gap: 20px; margin: 20px 0; padding: 15px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .features span { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        
        /* Gallery - Swipeable 4:3 */
        .gallery-container { position: relative; margin-bottom: 20px; }
        .gallery-main { width: 100%; aspect-ratio: 4/3; overflow: hidden; border-radius: 12px; position: relative; touch-action: pan-y pinch-zoom; }
        .gallery-main img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .gallery-dots { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .gallery-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; cursor: pointer; transition: all 0.3s; }
        .gallery-dot.active { width: 24px; border-radius: 4px; background: #006994; }
        
        /* External Booking Buttons */
        .external-buttons { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .ext-btn { padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; }
        .ext-btn.airbnb { background: #FF5A5F; color: white; }
        .ext-btn.agoda { background: #1E5D86; color: white; }
        .ext-btn.trip { background: #2680EB; color: white; }
        .ext-btn.booking { background: #003580; color: white; }
        
        /* Local Package Button */
        .local-btn { width: 100%; padding: 14px; background: #40B5AD; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; margin-bottom: 20px; }
        
        /* Booking Form (Hidden by default) */
        .booking-form-container { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .booking-form-container.show { display: block; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 13px; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 14px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .price-breakdown { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .price-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #dee2e6; }
        .price-row.total { border-bottom: none; font-weight: 700; font-size: 16px; padding-top: 10px; }
        .submit-btn { width: 100%; padding: 12px; background: #FF6B6B; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 16px; }
        .message { padding: 12px; border-radius: 8px; margin-bottom: 15px; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        
        /* Calendar */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-nav button { background: #e9ecef; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .calendar-weekday { font-weight: 600; padding: 8px 0; font-size: 12px; }
        .calendar-day { padding: 10px 5px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .calendar-day:hover:not(.booked):not(.empty) { background: #40B5AD; color: white; }
        .calendar-day.booked { background: #ffebee; color: #dc3545; text-decoration: line-through; cursor: not-allowed; }
        .calendar-day.selected { background: #006994; color: white; }
        .calendar-day.today { border: 2px solid #FF6B6B; }
        .legend { display: flex; gap: 15px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e9ecef; font-size: 12px; }
        .legend-color { width: 16px; height: 16px; border-radius: 4px; display: inline-block; margin-right: 5px; }
        
        .loading { text-align: center; padding: 50px; }
        
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .prices { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="logo">
                <img src="https://i.ibb.co/PvXs30RQ/IMG-20260204-180053-375.webp" alt="HTM Rentals">
                <span>HTM<span>Rentals</span></span>
            </a>
            <a href="index.html" class="back-link">← Back to Units</a>
        </div>
        
        <div id="content">
            <div class="loading">Loading unit details...</div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://api.htmrentals.com/api';
        const urlParams = new URLSearchParams(window.location.search);
        const unitId = urlParams.get('id');
        const urlCurrency = urlParams.get('currency') || 'USD';

        let unit = null;
        let selectedCheckIn = null;
        let selectedCheckOut = null;
        let bookedDates = [];
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        
        // Gallery variables
        let galleryImages = [];
        let currentImageIndex = 0;
        let slideInterval = null;
        let touchStartX = 0;

        async function loadUnit() {
            if (!unitId) {
                document.getElementById('content').innerHTML = '<div class="card"><p>No unit selected. <a href="index.html">Go back</a></p></div>';
                return;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/units/${unitId}`);
                const data = await response.json();
                if (data.success && data.unit) {
                    unit = data.unit;
                    if (typeof unit.gallery_images === 'string') {
                        try { unit.gallery_images = JSON.parse(unit.gallery_images); } catch(e) { unit.gallery_images = []; }
                    }
                    if (typeof unit.amenities === 'string') {
                        try { unit.amenities = JSON.parse(unit.amenities); } catch(e) { unit.amenities = []; }
                    }
                    unit.blocked_dates = data.blocked_dates || [];
                    renderUnitDetails();
                    await fetchAvailability();
                    generateCalendar(currentMonth, currentYear);
                    setupGallery();
                } else {
                    document.getElementById('content').innerHTML = '<div class="card"><p>Unit not found. <a href="index.html">Go back</a></p></div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = '<div class="card"><p>Failed to load unit. <a href="index.html">Go back</a></p></div>';
            }
        }

        function setupGallery() {
            galleryImages = [];
            if (unit.featured_image) galleryImages.push(unit.featured_image);
            if (unit.gallery_images && unit.gallery_images.length) galleryImages.push(...unit.gallery_images);
            
            if (galleryImages.length === 0) return;
            
            const mainImg = document.getElementById('gallery-main-img');
            if (mainImg) mainImg.src = galleryImages[0];
            
            // Setup swipe
            const galleryMain = document.getElementById('gallery-main');
            if (galleryMain) {
                galleryMain.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
                galleryMain.addEventListener('touchend', (e) => {
                    const endX = e.changedTouches[0].clientX;
                    const diff = touchStartX - endX;
                    if (Math.abs(diff) > 50) {
                        if (diff > 0) nextImage();
                        else prevImage();
                    }
                });
            }
            
            startAutoSlide();
        }

        function nextImage() {
            if (galleryImages.length === 0) return;
            currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
            updateGalleryImage();
        }

        function prevImage() {
            if (galleryImages.length === 0) return;
            currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
            updateGalleryImage();
        }

        function updateGalleryImage() {
            const mainImg = document.getElementById('gallery-main-img');
            if (mainImg) mainImg.src = galleryImages[currentImageIndex];
            const dots = document.querySelectorAll('.gallery-dot');
            dots.forEach((dot, idx) => {
                dot.classList.toggle('active', idx === currentImageIndex);
            });
            resetAutoSlide();
        }

        function goToImage(index) {
            currentImageIndex = index;
            updateGalleryImage();
        }

        function startAutoSlide() {
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                if (galleryImages.length > 1) nextImage();
            }, 5000);
        }

        function resetAutoSlide() {
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                if (galleryImages.length > 1) nextImage();
            }, 5000);
        }

        async function fetchAvailability() {
            if (!unit) return;
            try {
                const response = await fetch(`${API_BASE_URL}/bookings/availability?unit_id=${unit.id}`);
                const data = await response.json();
                if (data.success) {
                    bookedDates = [];
                    data.bookings.forEach(booking => {
                        const start = new Date(booking.check_in_date);
                        const end = new Date(booking.check_out_date);
                        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                            bookedDates.push(d.toISOString().split('T')[0]);
                        }
                    });
                    if (unit.blocked_dates) unit.blocked_dates.forEach(date => bookedDates.push(date));
                }
            } catch (error) { console.error('Error fetching availability:', error); }
        }

        function generateCalendar(month, year) {
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let html = '';
            const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            weekdays.forEach(day => html += `<div class="calendar-weekday">${day}</div>`);
            for (let i = 0; i < firstDay; i++) html += '<div class="calendar-day empty"></div>';
            const today = new Date();
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isBooked = bookedDates.includes(dateStr);
                const isToday = today.getDate() === d && today.getMonth() === month && today.getFullYear() === year;
                const isSelected = (selectedCheckIn === dateStr || selectedCheckOut === dateStr);
                let classes = 'calendar-day';
                if (isBooked) classes += ' booked';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                html += `<div class="${classes}" data-date="${dateStr}" onclick="selectDate('${dateStr}', ${isBooked})">${d}</div>`;
            }
            const grid = document.getElementById('calendar-grid');
            if (grid) grid.innerHTML = html;
            const monthYear = document.getElementById('calendar-month-year');
            if (monthYear) monthYear.textContent = `${monthNames[month]} ${year}`;
        }

        function selectDate(dateStr, isBooked) {
            if (isBooked) { showMessage('This date is not available', 'error'); return; }
            if (!selectedCheckIn || (selectedCheckIn && selectedCheckOut)) {
                selectedCheckIn = dateStr;
                selectedCheckOut = null;
                document.getElementById('check-in').value = formatDate(dateStr);
                document.getElementById('check-out').value = '';
                document.getElementById('price-breakdown').style.display = 'none';
            } else if (selectedCheckIn && !selectedCheckOut) {
                const checkInDate = new Date(selectedCheckIn);
                const checkOutDate = new Date(dateStr);
                if (checkOutDate <= checkInDate) { showMessage('Check-out must be after check-in', 'error'); return; }
                let hasBooked = false;
                let cur = new Date(checkInDate);
                cur.setDate(cur.getDate() + 1);
                while (cur < checkOutDate) {
                    if (bookedDates.includes(cur.toISOString().split('T')[0])) { hasBooked = true; break; }
                    cur.setDate(cur.getDate() + 1);
                }
                if (hasBooked) { showMessage('Some dates in between are booked', 'error'); return; }
                selectedCheckOut = dateStr;
                document.getElementById('check-out').value = formatDate(dateStr);
                const nights = Math.ceil((checkOutDate - checkInDate) / (1000*60*60*24));
                const total = nights * parseFloat(unit.rate_mvr);
                document.getElementById('night-count').textContent = nights;
                document.getElementById('subtotal').textContent = `MVR ${total}`;
                document.getElementById('total').textContent = `MVR ${total}`;
                document.getElementById('price-breakdown').style.display = 'block';
            }
            generateCalendar(currentMonth, currentYear);
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
        }

        function showMessage(msg, type) {
            const el = document.getElementById('form-message');
            if (!el) return;
            el.textContent = msg;
            el.className = `message ${type}`;
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function toggleBookingForm() {
            const form = document.getElementById('booking-form-container');
            form.classList.toggle('show');
            if (form.classList.contains('show')) {
                document.getElementById('booking-form').scrollIntoView({ behavior: 'smooth' });
            }
        }

        async function submitBooking(e) {
            e.preventDefault();
            if (!selectedCheckIn || !selectedCheckOut) {
                showMessage('Please select check-in and check-out dates', 'error');
                return;
            }
            const guests = document.getElementById('guests').value;
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            if (!guests || !name || !phone) {
                showMessage('Please fill all required fields', 'error');
                return;
            }
            const submitBtn = e.target.querySelector('.submit-btn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            submitBtn.disabled = true;
            try {
                const response = await fetch(`${API_BASE_URL}/bookings/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        unit_id: unit.id,
                        guest_name: name,
                        guest_email: '',
                        guest_phone: phone,
                        check_in_date: selectedCheckIn,
                        check_out_date: selectedCheckOut,
                        number_of_guests: parseInt(guests),
                        special_requests: '',
                        currency: 'MVR'
                    })
                });
                const data = await response.json();
                if (data.success) {
                    const nights = Math.ceil((new Date(selectedCheckOut) - new Date(selectedCheckIn)) / (1000*60*60*24));
                    const total = nights * parseFloat(unit.rate_mvr);
                    const msg = `*Local Booking Request - HTM Rentals*%0A%0A` +
                        `*Unit:* ${unit.unit_name}%0A` +
                        `*Guest:* ${name}%0A` +
                        `*Phone:* ${phone}%0A` +
                        `*Check-in:* ${formatDate(selectedCheckIn)}%0A` +
                        `*Check-out:* ${formatDate(selectedCheckOut)}%0A` +
                        `*Nights:* ${nights}%0A` +
                        `*Guests:* ${guests}%0A` +
                        `*Total:* MVR ${total}%0A%0A` +
                        `Please confirm this booking.`;
                    window.open(`https://wa.me/9609373113?text=${msg}`, '_blank');
                    showMessage('Booking request sent! We will contact you shortly.', 'success');
                    selectedCheckIn = null; selectedCheckOut = null;
                    document.getElementById('check-in').value = '';
                    document.getElementById('check-out').value = '';
                    document.getElementById('price-breakdown').style.display = 'none';
                    document.getElementById('guests').value = '';
                    document.getElementById('name').value = '';
                    document.getElementById('phone').value = '';
                    generateCalendar(currentMonth, currentYear);
                } else { showMessage(data.error || 'Booking failed', 'error'); }
            } catch (error) { showMessage('Network error. Please try again.', 'error'); }
            finally { submitBtn.innerHTML = originalText; submitBtn.disabled = false; }
        }

        function renderUnitDetails() {
            const defaultAmenities = ['Free WiFi', 'Smart TV', 'Air Conditioning', 'Kitchen', 'Tea & Coffee', 'Hot Water'];
            const amenitiesList = (unit.amenities && unit.amenities.length) ? unit.amenities : defaultAmenities;
            
            // Build gallery dots
            let galleryDotsHtml = '';
            if (galleryImages.length > 1) {
                for (let i = 0; i < galleryImages.length; i++) {
                    galleryDotsHtml += `<div class="gallery-dot ${i === 0 ? 'active' : ''}" onclick="goToImage(${i})"></div>`;
                }
            }
            
            // Build external buttons
            let externalButtonsHtml = '';
            if (unit.airbnb_url) externalButtonsHtml += `<a href="${unit.airbnb_url}" target="_blank" class="ext-btn airbnb"><i class="fab fa-airbnb"></i> Book on Airbnb</a>`;
            if (unit.agoda_url) externalButtonsHtml += `<a href="${unit.agoda_url}" target="_blank" class="ext-btn agoda">Agoda</a>`;
            if (unit.trip_url) externalButtonsHtml += `<a href="${unit.trip_url}" target="_blank" class="ext-btn trip">Trip.com</a>`;
            if (unit.booking_url) externalButtonsHtml += `<a href="${unit.booking_url}" target="_blank" class="ext-btn booking">Booking.com</a>`;
            
            document.getElementById('content').innerHTML = `
                <div class="card">
                    <div class="gallery-container">
                        <div class="gallery-main" id="gallery-main">
                            <img id="gallery-main-img" src="${galleryImages[0] || 'https://via.placeholder.com/800x600?text=HTM+Rentals'}" alt="${unit.unit_name}">
                        </div>
                        ${galleryImages.length > 1 ? `<div class="gallery-dots" id="gallery-dots">${galleryDotsHtml}</div>` : ''}
                    </div>
                    
                    <h1 class="unit-name">${escapeHtml(unit.unit_name)}</h1>
                    
                    <div class="prices">
                        <div class="price-card"><div class="currency">USD (Foreign Guests)</div><div class="amount">$${unit.rate_usd} <span style="font-size:14px;">/night</span></div></div>
                        <div class="price-card"><div class="currency">MVR (Local Guests)</div><div class="amount">MVR ${unit.rate_mvr} <span style="font-size:14px;">/night</span></div></div>
                    </div>
                    
                    <div class="features">
                        <span><i class="fas fa-user-friends"></i> ${unit.max_guests} guests</span>
                        <span><i class="fas fa-bed"></i> ${unit.bedrooms} bed(s)</span>
                    </div>
                    
                    <p>${unit.description || 'Comfortable apartment with all essential amenities for a relaxing stay.'}</p>
                    
                    <div style="margin: 15px 0; display: flex; flex-wrap: wrap; gap: 8px;">
                        ${amenitiesList.map(a => `<span style="background:#f0f2f5; padding:4px 12px; border-radius:20px; font-size:13px;"><i class="fas fa-check-circle" style="color:#40B5AD; margin-right:5px;"></i> ${escapeHtml(a)}</span>`).join('')}
                    </div>
                </div>
                
                <div class="card">
                    <h3>Book Your Stay</h3>
                    ${externalButtonsHtml ? `<div class="external-buttons">${externalButtonsHtml}</div>` : ''}
                    <button class="local-btn" onclick="toggleBookingForm()">📝 Local Package (MVR)</button>
                    
                    <div id="booking-form-container" class="booking-form-container">
                        <h4>Local Booking Form</h4>
                        <div class="calendar-header">
                            <h4 id="calendar-month-year">${monthNames[currentMonth]} ${currentYear}</h4>
                            <div class="calendar-nav">
                                <button id="prev-month"><i class="fas fa-chevron-left"></i></button>
                                <button id="next-month"><i class="fas fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div id="calendar-grid" class="calendar-grid"></div>
                        <div class="legend">
                            <div><span class="legend-color" style="background:white; border:2px solid #40B5AD;"></span> Available</div>
                            <div><span class="legend-color" style="background:#ffebee;"></span> Booked</div>
                            <div><span class="legend-color" style="background:#006994;"></span> Selected</div>
                        </div>
                        
                        <form id="booking-form" style="margin-top: 20px;">
                            <div class="form-row">
                                <div class="form-group"><label>Check-in</label><input type="text" id="check-in" readonly placeholder="Select date" required></div>
                                <div class="form-group"><label>Check-out</label><input type="text" id="check-out" readonly placeholder="Select date" required></div>
                            </div>
                            <div class="form-group"><label>Number of Guests</label><select id="guests" required><option value="">Select</option><option value="1">1 Guest</option><option value="2">2 Guests</option><option value="3">3 Guests</option><option value="4">4 Guests</option></select></div>
                            <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Full name" required></div>
                            <div class="form-group"><label>Phone Number</label><input type="tel" id="phone" placeholder="Phone number" required></div>
                            <div id="price-breakdown" class="price-breakdown" style="display:none;">
                                <div class="price-row"><span>MVR ${unit.rate_mvr} × <span id="night-count">0</span> nights</span><span id="subtotal">MVR 0</span></div>
                                <div class="price-row total"><span>Total</span><span id="total">MVR 0</span></div>
                            </div>
                            <div id="form-message" class="message"></div>
                            <button type="submit" class="submit-btn">Request Booking (MVR)</button>
                        </form>
                    </div>
                </div>
            `;
            
            // Re-attach event listeners
            document.getElementById('prev-month')?.addEventListener('click', () => {
                currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; }
                generateCalendar(currentMonth, currentYear);
            });
            document.getElementById('next-month')?.addEventListener('click', () => {
                currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; }
                generateCalendar(currentMonth, currentYear);
            });
            document.getElementById('booking-form')?.addEventListener('submit', submitBooking);
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        loadUnit();
    </script>
</body>
</html>
