<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>HTM Rentals | Unit Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
            color: #222222;
        }

        /* YOUR COLOR PALETTE */
        :root {
            --navy: #0A2540;
            --ocean: #006994;
            --turquoise: #40B5AD;
            --white: #FFFFFF;
            --gray-light: #F8F9FA;
            --gray-border: #E5E5E5;
            --gray-text: #6C757D;
            --radius-lg: 20px;
            --radius-md: 12px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--gray-border);
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo img {
            height: 40px;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .logo-text span:first-child {
            color: var(--navy);
        }

        .logo-text span:last-child {
            color: var(--turquoise);
        }

        .back-link {
            color: var(--ocean);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: var(--turquoise);
        }

        /* TWO COLUMN LAYOUT (Airbnb style) */
        .unit-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 48px;
            margin-top: 24px;
        }

        @media (max-width: 900px) {
            .unit-layout {
                grid-template-columns: 1fr;
                gap: 32px;
            }
            .booking-card {
                position: static;
                margin-top: 24px;
            }
        }

        /* GALLERY - Modern grid layout */
        .gallery-container {
            margin-bottom: 24px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 8px;
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .gallery-main-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            aspect-ratio: 1 / 1;
        }

        .gallery-side {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .gallery-side-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            cursor: pointer;
        }

        .gallery-more {
            position: relative;
        }

        .gallery-more-overlay {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
        }

        /* For mobile - simple slider */
        @media (max-width: 640px) {
            .gallery-grid {
                display: flex;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                gap: 0;
            }
            .gallery-grid > * {
                min-width: 100%;
                scroll-snap-align: start;
            }
            .gallery-side {
                display: none;
            }
        }

        /* Unit Title Section */
        .unit-title h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 500;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .unit-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--gray-border);
            margin-bottom: 24px;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .rating i {
            color: var(--turquoise);
            font-size: 14px;
        }

        .rating span {
            font-size: 14px;
            font-weight: 500;
        }

        .reviews {
            color: var(--gray-text);
            text-decoration: underline;
        }

        .host-badge {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .host-avatar {
            width: 40px;
            height: 40px;
            background: var(--turquoise);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        /* Features row */
        .features-row {
            display: flex;
            gap: 24px;
            padding: 16px 0;
            border-bottom: 1px solid var(--gray-border);
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feature i {
            font-size: 20px;
            color: var(--ocean);
        }

        .feature-text {
            font-size: 14px;
            color: var(--gray-text);
        }

        .feature-text strong {
            display: block;
            color: var(--navy);
            font-weight: 600;
        }

        /* Description */
        .description {
            margin-bottom: 32px;
            line-height: 1.6;
            color: #444;
        }

        /* Amenities Grid */
        .amenities-section {
            margin-bottom: 32px;
        }

        .amenities-section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--navy);
            margin-bottom: 16px;
        }

        .amenities-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .amenity {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
        }

        .amenity i {
            width: 24px;
            color: var(--turquoise);
            font-size: 16px;
        }

        .amenity span {
            font-size: 14px;
        }

        /* External Booking Buttons */
        .external-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 24px 0;
            padding-top: 16px;
            border-top: 1px solid var(--gray-border);
        }

        .ext-btn {
            flex: 1;
            min-width: 100px;
            padding: 10px 16px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .ext-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .ext-btn.airbnb { background: #FF5A5F; color: white; }
        .ext-btn.agoda { background: #1E5D86; color: white; }
        .ext-btn.trip { background: #2680EB; color: white; }
        .ext-btn.booking { background: #003580; color: white; }

        /* BOOKING CARD (Sticky) */
        .booking-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-border);
            position: sticky;
            top: 24px;
        }

        .price-display {
            display: flex;
            align-items: baseline;
            gap: 4px;
            margin-bottom: 16px;
        }

        .price-amount {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--navy);
        }

        .price-nightly {
            font-size: 14px;
            color: var(--gray-text);
        }

        /* Calendar (always visible) */
        .calendar-section {
            margin: 20px 0;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-nav button {
            background: var(--gray-light);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }

        .calendar-nav button:hover {
            background: var(--turquoise);
            color: white;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }

        .calendar-weekday {
            font-weight: 600;
            padding: 10px 0;
            font-size: 12px;
            color: var(--gray-text);
        }

        .calendar-day {
            padding: 10px 5px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .calendar-day:hover:not(.booked):not(.empty) {
            background: var(--turquoise);
            color: white;
        }

        .calendar-day.booked {
            background: #FFEBEE;
            color: #DC3545;
            text-decoration: line-through;
            cursor: not-allowed;
        }

        .calendar-day.selected {
            background: var(--ocean);
            color: white;
        }

        .calendar-day.today {
            border: 2px solid var(--turquoise);
            font-weight: 600;
        }

        .calendar-day.empty {
            cursor: default;
            background: transparent;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--gray-border);
            font-size: 12px;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            display: inline-block;
            margin-right: 6px;
        }

        /* Date Inputs */
        .date-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
        }

        .date-field {
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-md);
            padding: 12px;
            background: var(--gray-light);
        }

        .date-field label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--gray-text);
            display: block;
            margin-bottom: 4px;
        }

        .date-field input {
            background: transparent;
            border: none;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }

        .date-field input:focus {
            outline: none;
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 13px;
            color: var(--navy);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-md);
            font-size: 14px;
            transition: all 0.3s;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--turquoise);
        }

        .price-breakdown {
            background: var(--gray-light);
            padding: 16px;
            border-radius: var(--radius-md);
            margin: 16px 0;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }

        .price-row.total {
            font-weight: 700;
            border-top: 1px solid var(--gray-border);
            margin-top: 8px;
            padding-top: 12px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--turquoise);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: var(--ocean);
            transform: translateY(-2px);
        }

        .local-btn {
            width: 100%;
            padding: 14px;
            background: var(--ocean);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin: 16px 0;
            transition: all 0.3s ease;
        }

        .local-btn:hover {
            background: var(--navy);
            transform: translateY(-2px);
        }

        .message {
            padding: 14px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            display: none;
        }

        .message.success {
            background: #D4EDDA;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #F8D7DA;
            color: #721C24;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--gray-text);
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid var(--gray-border);
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 16px;
            }
            .unit-title h1 {
                font-size: 1.4rem;
            }
            .features-row {
                gap: 16px;
            }
            .amenities-grid {
                grid-template-columns: 1fr;
            }
            .external-buttons {
                flex-wrap: wrap;
            }
            .ext-btn {
                flex: auto;
                min-width: calc(50% - 6px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="logo">
                <img src="https://i.ibb.co/PvXs30RQ/IMG-20260204-180053-375.webp" alt="HTM Rentals">
                <div class="logo-text"><span>HTM</span><span>Rentals</span></div>
            </a>
            <a href="index.html" class="back-link">← Back to Units</a>
        </div>
        <div id="content"><div class="loading">Loading unit details...</div></div>
    </div>

    <script>
        const API_BASE_URL = 'https://api.htmrentals.com/api';
        const urlParams = new URLSearchParams(window.location.search);
        const unitId = urlParams.get('id');

        let unit = null;
        let selectedCheckIn = null;
        let selectedCheckOut = null;
        let bookedDates = [];
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        let galleryImages = [];
        let currentImageIndex = 0;

        async function loadUnit() {
            if (!unitId) {
                document.getElementById('content').innerHTML = '<div class="card"><p>No unit selected. <a href="index.html">Go back</a></p></div>';
                return;
            }
            try {
                const res = await fetch(`${API_BASE_URL}/units/${unitId}`);
                const data = await res.json();
                if (data.success && data.unit) {
                    unit = data.unit;
                    if (typeof unit.gallery_images === 'string') {
                        try { unit.gallery_images = JSON.parse(unit.gallery_images); } catch(e) { unit.gallery_images = []; }
                    }
                    if (typeof unit.amenities === 'string') {
                        try { unit.amenities = JSON.parse(unit.amenities); } catch(e) { unit.amenities = []; }
                    }
                    unit.blocked_dates = data.blocked_dates || [];
                    
                    // Build gallery array
                    galleryImages = [];
                    if (unit.featured_image) galleryImages.push(unit.featured_image);
                    if (unit.gallery_images && unit.gallery_images.length) galleryImages.push(...unit.gallery_images);
                    
                    await fetchAvailability();
                    renderUnitDetails();
                    generateCalendar(currentMonth, currentYear);
                } else {
                    document.getElementById('content').innerHTML = '<div class="card"><p>Unit not found. <a href="index.html">Go back</a></p></div>';
                }
            } catch(e) {
                document.getElementById('content').innerHTML = '<div class="card"><p>Failed to load unit. <a href="index.html">Go back</a></p></div>';
            }
        }

        async function fetchAvailability() {
            if (!unit) return;
            try {
                const res = await fetch(`${API_BASE_URL}/bookings/availability?unit_id=${unit.id}`);
                const data = await res.json();
                if (data.success) {
                    bookedDates = [];
                    data.bookings.forEach(booking => {
                        const start = new Date(booking.check_in_date);
                        const end = new Date(booking.check_out_date);
                        for (let d = new Date(start); d < end; d.setDate(d.getDate() + 1)) {
                            bookedDates.push(d.toISOString().split('T')[0]);
                        }
                    });
                    if (unit.blocked_dates) unit.blocked_dates.forEach(date => bookedDates.push(date));
                }
            } catch(e) { console.error(e); }
        }

        function generateCalendar(month, year) {
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let html = '';
            const weekdays = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
            weekdays.forEach(day => html += `<div class="calendar-weekday">${day}</div>`);
            
            for (let i = 0; i < firstDay; i++) html += '<div class="calendar-day empty"></div>';
            
            const today = new Date();
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isBooked = bookedDates.includes(dateStr);
                const isToday = today.getDate() === d && today.getMonth() === month && today.getFullYear() === year;
                const isSelected = (selectedCheckIn === dateStr || selectedCheckOut === dateStr);
                let classes = 'calendar-day';
                if (isBooked) classes += ' booked';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                html += `<div class="${classes}" data-date="${dateStr}" onclick="selectDate('${dateStr}', ${isBooked})">${d}</div>`;
            }
            
            const grid = document.getElementById('calendar-grid');
            if (grid) grid.innerHTML = html;
            const monthYear = document.getElementById('calendar-month-year');
            if (monthYear) monthYear.textContent = `${monthNames[month]} ${year}`;
        }

        function selectDate(dateStr, isBooked) {
            if (isBooked) {
                showMessage('This date is not available', 'error');
                return;
            }
            
            if (!selectedCheckIn) {
                selectedCheckIn = dateStr;
                selectedCheckOut = null;
                document.getElementById('check-in').value = formatDate(dateStr);
                document.getElementById('check-out').value = '';
                document.getElementById('price-breakdown').style.display = 'none';
                generateCalendar(currentMonth, currentYear);
                return;
            }
            
            if (selectedCheckIn && !selectedCheckOut) {
                const checkInDate = new Date(selectedCheckIn);
                const checkOutDate = new Date(dateStr);
                
                if (checkOutDate < checkInDate) {
                    selectedCheckIn = dateStr;
                    selectedCheckOut = null;
                    document.getElementById('check-in').value = formatDate(dateStr);
                    document.getElementById('check-out').value = '';
                    document.getElementById('price-breakdown').style.display = 'none';
                    generateCalendar(currentMonth, currentYear);
                    return;
                }
                
                // Check availability for all nights (excluding check-out)
                let hasBookedNight = false;
                let cur = new Date(checkInDate);
                while (cur < checkOutDate) {
                    const dateToCheck = cur.toISOString().split('T')[0];
                    if (bookedDates.includes(dateToCheck)) {
                        hasBookedNight = true;
                        break;
                    }
                    cur.setDate(cur.getDate() + 1);
                }
                
                if (hasBookedNight) {
                    showMessage('One or more nights between your selected dates are already booked', 'error');
                    return;
                }
                
                selectedCheckOut = dateStr;
                document.getElementById('check-out').value = formatDate(dateStr);
                
                const nights = Math.max(1, Math.ceil((checkOutDate - checkInDate) / (1000 * 60 * 60 * 24)));
                const total = nights * parseFloat(unit.rate_mvr);
                
                document.getElementById('night-count').textContent = nights;
                document.getElementById('subtotal').textContent = `MVR ${total.toFixed(2)}`;
                document.getElementById('total').textContent = `MVR ${total.toFixed(2)}`;
                document.getElementById('price-breakdown').style.display = 'block';
                generateCalendar(currentMonth, currentYear);
                return;
            }
            
            if (selectedCheckIn && selectedCheckOut) {
                selectedCheckIn = dateStr;
                selectedCheckOut = null;
                document.getElementById('check-in').value = formatDate(dateStr);
                document.getElementById('check-out').value = '';
                document.getElementById('price-breakdown').style.display = 'none';
                generateCalendar(currentMonth, currentYear);
                return;
            }
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function showMessage(msg, type) {
            const el = document.getElementById('form-message');
            if (!el) return;
            el.textContent = msg;
            el.className = `message ${type}`;
            setTimeout(() => {
                el.style.display = 'none';
                el.className = 'message';
            }, 5000);
        }

        async function submitBooking(e) {
            e.preventDefault();
            
            if (!selectedCheckIn || !selectedCheckOut) {
                showMessage('Please select check-in and check-out dates', 'error');
                return;
            }
            
            const guests = document.getElementById('guests').value;
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            
            if (!guests || !name || !phone) {
                showMessage('Please fill all required fields', 'error');
                return;
            }
            
            const submitBtn = e.target.querySelector('.submit-btn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            submitBtn.disabled = true;
            
            try {
                const checkInDate = new Date(selectedCheckIn);
                const checkOutDate = new Date(selectedCheckOut);
                const nights = Math.max(1, Math.ceil((checkOutDate - checkInDate) / (1000 * 60 * 60 * 24)));
                const total = nights * parseFloat(unit.rate_mvr);
                
                const res = await fetch(`${API_BASE_URL}/bookings/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        unit_id: unit.id,
                        guest_name: name,
                        guest_email: '',
                        guest_phone: phone,
                        check_in_date: selectedCheckIn,
                        check_out_date: selectedCheckOut,
                        number_of_guests: parseInt(guests),
                        special_requests: '',
                        currency: 'MVR'
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showMessage('Booking request sent! We will contact you shortly.', 'success');
                    
                    const msg = `*New Local Booking Request - HTM Rentals*%0A%0A` +
                        `*Booking ID:* ${data.booking_id}%0A` +
                        `*Unit:* ${unit.unit_name}%0A` +
                        `*Guest:* ${name}%0A` +
                        `*Phone:* ${phone}%0A` +
                        `*Check-in:* ${formatDate(selectedCheckIn)} (14:00)%0A` +
                        `*Check-out:* ${formatDate(selectedCheckOut)} (12:00)%0A` +
                        `*Nights:* ${nights}%0A` +
                        `*Guests:* ${guests}%0A` +
                        `*Total:* MVR ${total.toFixed(2)}%0A%0A` +
                        `Please confirm this booking in the admin panel.`;
                    
                    window.open(`https://wa.me/9609373113?text=${msg}`, '_blank');
                    
                    selectedCheckIn = null;
                    selectedCheckOut = null;
                    document.getElementById('check-in').value = '';
                    document.getElementById('check-out').value = '';
                    document.getElementById('price-breakdown').style.display = 'none';
                    document.getElementById('guests').value = '';
                    document.getElementById('name').value = '';
                    document.getElementById('phone').value = '';
                    
                    generateCalendar(currentMonth, currentYear);
                } else {
                    showMessage(data.error || 'Booking failed', 'error');
                }
            } catch(error) {
                console.error('Booking error:', error);
                showMessage('Network error. Please try again.', 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }

        function renderUnitDetails() {
            const defaultAmenities = ['Free WiFi', 'Smart TV', 'Air Conditioning', 'Kitchen', 'Tea & Coffee', 'Hot Water'];
            const amenitiesList = (unit.amenities && unit.amenities.length) ? unit.amenities : defaultAmenities;
            
            // Build gallery HTML (grid layout for desktop, simple for mobile)
            let galleryHtml = '';
            if (galleryImages.length === 1) {
                galleryHtml = `<div class="gallery-grid"><img src="${galleryImages[0]}" class="gallery-main-img" onclick="openLightbox(0)"></div>`;
            } else if (galleryImages.length === 2) {
                galleryHtml = `<div class="gallery-grid">
                    <img src="${galleryImages[0]}" class="gallery-main-img" onclick="openLightbox(0)">
                    <img src="${galleryImages[1]}" class="gallery-main-img" onclick="openLightbox(1)">
                </div>`;
            } else if (galleryImages.length >= 3) {
                galleryHtml = `<div class="gallery-grid">
                    <img src="${galleryImages[0]}" class="gallery-main-img" onclick="openLightbox(0)">
                    <div class="gallery-side">
                        <img src="${galleryImages[1]}" class="gallery-side-img" onclick="openLightbox(1)">
                        <div class="gallery-more">
                            <img src="${galleryImages[2]}" class="gallery-side-img" onclick="openLightbox(2)">
                            ${galleryImages.length > 3 ? `<div class="gallery-more-overlay">+${galleryImages.length - 3} more</div>` : ''}
                        </div>
                    </div>
                </div>`;
            }
            
            // External buttons
            let externalButtonsHtml = '';
            if (unit.airbnb_url) externalButtonsHtml += `<a href="${unit.airbnb_url}" target="_blank" class="ext-btn airbnb"><i class="fab fa-airbnb"></i> Airbnb</a>`;
            if (unit.agoda_url) externalButtonsHtml += `<a href="${unit.agoda_url}" target="_blank" class="ext-btn agoda">Agoda</a>`;
            if (unit.trip_url) externalButtonsHtml += `<a href="${unit.trip_url}" target="_blank" class="ext-btn trip">Trip.com</a>`;
            if (unit.booking_url) externalButtonsHtml += `<a href="${unit.booking_url}" target="_blank" class="ext-btn booking">Booking.com</a>`;
            
            // Rating display (mock - can be made dynamic later)
            const rating = '4.84';
            const reviewCount = '128';
            
            document.getElementById('content').innerHTML = `
                <div class="unit-layout">
                    <!-- LEFT COLUMN - Content -->
                    <div>
                        <div class="gallery-container">${galleryHtml || '<div class="gallery-grid"><img src="https://via.placeholder.com/800x600?text=HTM+Rentals" class="gallery-main-img"></div>'}</div>
                        
                        <div class="unit-title">
                            <h1>${escapeHtml(unit.unit_name)}</h1>
                        </div>
                        
                        <div class="unit-meta">
                            <div class="rating">
                                <i class="fas fa-star"></i>
                                <span>${rating}</span>
                                <span class="reviews">(${reviewCount} reviews)</span>
                            </div>
                            <div class="host-badge">
                                <div class="host-avatar"><i class="fas fa-home"></i></div>
                                <span>Superhost · HTM Rentals</span>
                            </div>
                        </div>
                        
                        <div class="features-row">
                            <div class="feature">
                                <i class="fas fa-user-friends"></i>
                                <div class="feature-text"><strong>${unit.max_guests} guests</strong> Maximum capacity</div>
                            </div>
                            <div class="feature">
                                <i class="fas fa-bed"></i>
                                <div class="feature-text"><strong>${unit.bedrooms} bedroom</strong> ${unit.bedrooms} bed</div>
                            </div>
                            <div class="feature">
                                <i class="fas fa-bath"></i>
                                <div class="feature-text"><strong>1 bathroom</strong> Private</div>
                            </div>
                        </div>
                        
                        <div class="description">
                            <p>${unit.description || 'Comfortable apartment with all essential amenities for a relaxing stay in Hulhumale\'. Perfect for business travelers, couples, or small families.'}</p>
                        </div>
                        
                        <div class="amenities-section">
                            <h3>What this place offers</h3>
                            <div class="amenities-grid">
                                ${amenitiesList.map(a => `<div class="amenity"><i class="fas fa-check-circle"></i><span>${escapeHtml(a)}</span></div>`).join('')}
                            </div>
                        </div>
                        
                        ${externalButtonsHtml ? `<div class="external-buttons">${externalButtonsHtml}</div>` : ''}
                    </div>
                    
                    <!-- RIGHT COLUMN - Booking Card (Sticky) -->
                    <div>
                        <div class="booking-card">
                            <div class="price-display">
                                <span class="price-amount">MVR ${unit.rate_mvr}</span>
                                <span class="price-nightly">/ night</span>
                            </div>
                            
                            <div class="calendar-section">
                                <div class="calendar-header">
                                    <h4 id="calendar-month-year">${monthNames[currentMonth]} ${currentYear}</h4>
                                    <div class="calendar-nav">
                                        <button id="prev-month"><i class="fas fa-chevron-left"></i></button>
                                        <button id="next-month"><i class="fas fa-chevron-right"></i></button>
                                    </div>
                                </div>
                                <div id="calendar-grid" class="calendar-grid"></div>
                                <div class="legend">
                                    <div><span class="legend-color" style="background:white; border:2px solid var(--turquoise);"></span> Available</div>
                                    <div><span class="legend-color" style="background:#FFEBEE;"></span> Booked</div>
                                    <div><span class="legend-color" style="background:var(--ocean);"></span> Selected</div>
                                </div>
                            </div>
                            
                            <div class="date-inputs">
                                <div class="date-field">
                                    <label>CHECK-IN</label>
                                    <input type="text" id="check-in" readonly placeholder="Add date" value="">
                                </div>
                                <div class="date-field">
                                    <label>CHECK-OUT</label>
                                    <input type="text" id="check-out" readonly placeholder="Add date" value="">
                                </div>
                            </div>
                            
                            <form id="booking-form">
                                <div class="form-group">
                                    <label>Guests</label>
                                    <select id="guests" required>
                                        <option value="">Select</option>
                                        <option value="1">1 guest</option>
                                        <option value="2">2 guests</option>
                                        <option value="3">3 guests</option>
                                        <option value="4">4 guests</option>
                                    </select>
                                </div>
                                
                                <div class="form-group">
                                    <label>Full name</label>
                                    <input type="text" id="name" placeholder="Your full name" required>
                                </div>
                                
                                <div class="form-group">
                                    <label>Phone number</label>
                                    <input type="tel" id="phone" placeholder="WhatsApp / Mobile number" required>
                                </div>
                                
                                <div id="price-breakdown" class="price-breakdown" style="display:none;">
                                    <div class="price-row">
                                        <span>MVR ${unit.rate_mvr} × <span id="night-count">0</span> nights</span>
                                        <span id="subtotal">MVR 0</span>
                                    </div>
                                    <div class="price-row total">
                                        <span>Total (MVR)</span>
                                        <span id="total">MVR 0</span>
                                    </div>
                                </div>
                                
                                <div id="form-message" class="message"></div>
                                
                                <button type="submit" class="submit-btn">Request to book</button>
                            </form>
                            
                            <hr>
                            
                            <p style="font-size: 12px; color: var(--gray-text); text-align: center; margin-top: 12px;">
                                <i class="fas fa-lock"></i> You won't be charged yet
                            </p>
                        </div>
                    </div>
                </div>
            `;
            
            // Attach event listeners
            document.getElementById('prev-month')?.addEventListener('click', () => {
                currentMonth--;
                if (currentMonth < 0) { currentMonth = 11; currentYear--; }
                generateCalendar(currentMonth, currentYear);
            });
            document.getElementById('next-month')?.addEventListener('click', () => {
                currentMonth++;
                if (currentMonth > 11) { currentMonth = 0; currentYear++; }
                generateCalendar(currentMonth, currentYear);
            });
            document.getElementById('booking-form')?.addEventListener('submit', submitBooking);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }
        
        // Simple lightbox function
        window.openLightbox = function(index) {
            // Can be expanded later for full lightbox
            window.open(galleryImages[index], '_blank');
        };
        
        loadUnit();
    </script>
</body>
</html>
