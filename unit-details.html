<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>HTM Rentals | Unit Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #006994; text-decoration: none; font-weight: 500; }
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .unit-name { font-size: 28px; font-weight: 700; color: #006994; margin-bottom: 10px; }
        .unit-price { font-size: 32px; font-weight: 700; color: #006994; margin: 15px 0; }
        .features { display: flex; flex-wrap: wrap; gap: 20px; margin: 20px 0; padding: 15px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .features span { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .booking-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        @media (max-width: 768px) { .booking-row { grid-template-columns: 1fr; } }
        
        /* Gallery Styles */
        .gallery-main { width: 100%; height: 400px; overflow: hidden; border-radius: 12px; margin-bottom: 15px; }
        .gallery-main img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-thumbs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .gallery-thumb { width: 80px; height: 80px; border-radius: 8px; overflow: hidden; cursor: pointer; opacity: 0.6; transition: opacity 0.3s; }
        .gallery-thumb.active { opacity: 1; border: 2px solid #006994; }
        .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-nav button { background: #e9ecef; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .calendar-weekday { font-weight: 600; padding: 8px 0; font-size: 12px; }
        .calendar-day { padding: 10px 5px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .calendar-day:hover:not(.booked):not(.empty) { background: #40B5AD; color: white; }
        .calendar-day.booked { background: #ffebee; color: #dc3545; text-decoration: line-through; cursor: not-allowed; }
        .calendar-day.selected { background: #006994; color: white; }
        .calendar-day.today { border: 2px solid #FF6B6B; }
        .legend { display: flex; gap: 15px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e9ecef; font-size: 12px; }
        .legend-color { width: 16px; height: 16px; border-radius: 4px; display: inline-block; margin-right: 5px; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 14px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .price-breakdown { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .price-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #dee2e6; }
        .price-row.total { border-bottom: none; font-weight: 700; font-size: 16px; padding-top: 10px; }
        .btn { width: 100%; padding: 12px; background: #FF6B6B; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #ff5252; }
        .message { padding: 12px; border-radius: 8px; margin-bottom: 15px; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .loading { text-align: center; padding: 50px; }
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; text-decoration: none; z-index: 100; }
    </style>
</head>
<body>
    <a href="https://wa.me/9609373113" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
    
    <div class="container" id="content">
        <div class="loading">Loading unit details...</div>
    </div>

    <script>
        const API_BASE_URL = 'https://api.htmrentals.com/api';
        const urlParams = new URLSearchParams(window.location.search);
        const unitId = urlParams.get('id');
        const currency = urlParams.get('currency') || 'USD';

        let unit = null;
        let selectedCheckIn = null;
        let selectedCheckOut = null;
        let bookedDates = [];
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        async function loadUnit() {
            if (!unitId) {
                document.getElementById('content').innerHTML = '<div class="error">No unit selected. <a href="index.html">Go back</a></div>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/units/${unitId}`);
                const data = await response.json();
                if (data.success && data.unit) {
                    unit = data.unit;
                    // Parse JSON strings
                    if (typeof unit.gallery_images === 'string') {
                        try {
                            unit.gallery_images = JSON.parse(unit.gallery_images);
                        } catch(e) {
                            unit.gallery_images = [];
                        }
                    }
                    if (typeof unit.amenities === 'string') {
                        try {
                            unit.amenities = JSON.parse(unit.amenities);
                        } catch(e) {
                            unit.amenities = [];
                        }
                    }
                    unit.blocked_dates = data.blocked_dates || [];
                    renderUnitDetails();
                    await fetchAvailability();
                    generateCalendar(currentMonth, currentYear);
                } else {
                    document.getElementById('content').innerHTML = '<div class="error">Unit not found. <a href="index.html">Go back</a></div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = '<div class="error">Failed to load unit. <a href="index.html">Go back</a></div>';
            }
        }

        function getDisplayPrice() {
            if (currency === 'MVR') {
                return `MVR ${unit.rate_mvr}`;
            }
            return `$${unit.rate_usd}`;
        }

        function getNightlyRate() {
            if (currency === 'MVR') {
                return parseFloat(unit.rate_mvr);
            }
            return parseFloat(unit.rate_usd);
        }

        async function fetchAvailability() {
            if (!unit) return;
            try {
                const response = await fetch(`${API_BASE_URL}/bookings/availability?unit_id=${unit.id}`);
                const data = await response.json();
                if (data.success) {
                    bookedDates = [];
                    data.bookings.forEach(booking => {
                        const start = new Date(booking.check_in_date);
                        const end = new Date(booking.check_out_date);
                        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                            bookedDates.push(d.toISOString().split('T')[0]);
                        }
                    });
                    if (unit.blocked_dates) {
                        unit.blocked_dates.forEach(date => bookedDates.push(date));
                    }
                }
            } catch (error) {
                console.error('Error fetching availability:', error);
            }
        }

        function generateCalendar(month, year) {
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let html = '';
            const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            weekdays.forEach(day => html += `<div class="calendar-weekday">${day}</div>`);
            for (let i = 0; i < firstDay; i++) html += '<div class="calendar-day empty"></div>';
            const today = new Date();
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isBooked = bookedDates.includes(dateStr);
                const isToday = today.getDate() === d && today.getMonth() === month && today.getFullYear() === year;
                const isSelected = (selectedCheckIn === dateStr || selectedCheckOut === dateStr);
                let classes = 'calendar-day';
                if (isBooked) classes += ' booked';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                html += `<div class="${classes}" data-date="${dateStr}" onclick="selectDate('${dateStr}', ${isBooked})">${d}</div>`;
            }
            const grid = document.getElementById('calendar-grid');
            if (grid) grid.innerHTML = html;
            const monthYear = document.getElementById('calendar-month-year');
            if (monthYear) monthYear.textContent = `${monthNames[month]} ${year}`;
        }

        function selectDate(dateStr, isBooked) {
            if (isBooked) {
                showMessage('This date is not available', 'error');
                return;
            }
            if (!selectedCheckIn || (selectedCheckIn && selectedCheckOut)) {
                selectedCheckIn = dateStr;
                selectedCheckOut = null;
                document.getElementById('check-in').value = formatDate(dateStr);
                document.getElementById('check-out').value = '';
                document.getElementById('price-breakdown').style.display = 'none';
            } else if (selectedCheckIn && !selectedCheckOut) {
                const checkInDate = new Date(selectedCheckIn);
                const checkOutDate = new Date(dateStr);
                if (checkOutDate <= checkInDate) {
                    showMessage('Check-out must be after check-in', 'error');
                    return;
                }
                let hasBooked = false;
                let cur = new Date(checkInDate);
                cur.setDate(cur.getDate() + 1);
                while (cur < checkOutDate) {
                    if (bookedDates.includes(cur.toISOString().split('T')[0])) { hasBooked = true; break; }
                    cur.setDate(cur.getDate() + 1);
                }
                if (hasBooked) {
                    showMessage('Some dates in between are booked', 'error');
                    return;
                }
                selectedCheckOut = dateStr;
                document.getElementById('check-out').value = formatDate(dateStr);
                const nights = Math.ceil((checkOutDate - checkInDate) / (1000*60*60*24));
                const nightlyRate = getNightlyRate();
                const total = nights * nightlyRate;
                document.getElementById('night-count').textContent = nights;
                const symbol = currency === 'MVR' ? 'MVR ' : '$';
                document.getElementById('subtotal').textContent = `${symbol}${total}`;
                document.getElementById('total').textContent = `${symbol}${total}`;
                document.getElementById('price-breakdown').style.display = 'block';
            }
            generateCalendar(currentMonth, currentYear);
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
        }

        function showMessage(msg, type) {
            const el = document.getElementById('form-message');
            if (!el) return;
            el.textContent = msg;
            el.className = `message ${type}`;
            setTimeout(() => el.style.display = 'none', 5000);
        }

        async function submitBooking(e) {
            e.preventDefault();
            if (!selectedCheckIn || !selectedCheckOut) {
                showMessage('Please select check-in and check-out dates', 'error');
                return;
            }
            const guests = document.getElementById('guests').value;
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const requests = document.getElementById('requests').value;
            if (!guests || !name || !phone || !email) {
                showMessage('Please fill all required fields', 'error');
                return;
            }
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            submitBtn.disabled = true;
            try {
                const response = await fetch(`${API_BASE_URL}/bookings/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        unit_id: unit.id,
                        guest_name: name,
                        guest_email: email,
                        guest_phone: phone,
                        check_in_date: selectedCheckIn,
                        check_out_date: selectedCheckOut,
                        number_of_guests: parseInt(guests),
                        special_requests: requests,
                        currency: currency
                    })
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('Booking request sent! We will contact you shortly.', 'success');
                    const nights = Math.ceil((new Date(selectedCheckOut) - new Date(selectedCheckIn)) / (1000*60*60*24));
                    const total = nights * getNightlyRate();
                    const symbol = currency === 'MVR' ? 'MVR' : '$';
                    const msg = `*Booking Request - HTM Rentals*%0A%0A` +
                        `*Unit:* ${unit.unit_name}%0A` +
                        `*Guest:* ${name}%0A` +
                        `*Check-in:* ${formatDate(selectedCheckIn)}%0A` +
                        `*Check-out:* ${formatDate(selectedCheckOut)}%0A` +
                        `*Nights:* ${nights}%0A` +
                        `*Guests:* ${guests}%0A` +
                        `*Total:* ${symbol}${total}%0A%0A` +
                        `Thank you for choosing HTM Rentals!`;
                    window.open(`https://wa.me/9609373113?text=${msg}`, '_blank');
                    selectedCheckIn = null;
                    selectedCheckOut = null;
                    document.getElementById('check-in').value = '';
                    document.getElementById('check-out').value = '';
                    document.getElementById('price-breakdown').style.display = 'none';
                    document.getElementById('guests').value = '';
                    document.getElementById('name').value = '';
                    document.getElementById('phone').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('requests').value = '';
                    generateCalendar(currentMonth, currentYear);
                } else {
                    showMessage(data.error || 'Booking failed', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }

        function renderUnitDetails() {
            const price = getDisplayPrice();
            const nightlyRate = getNightlyRate();
            const symbol = currency === 'MVR' ? 'MVR' : '$';

            // Build gallery
            let galleryHtml = '';
            const allImages = [];
            if (unit.featured_image) allImages.push(unit.featured_image);
            if (unit.gallery_images && unit.gallery_images.length) {
                allImages.push(...unit.gallery_images);
            }
            
            if (allImages.length > 0) {
                galleryHtml = `
                    <div class="gallery-main" id="gallery-main">
                        <img src="${allImages[0]}" alt="${unit.unit_name}">
                    </div>
                    <div class="gallery-thumbs" id="gallery-thumbs">
                        ${allImages.map((img, idx) => `
                            <div class="gallery-thumb ${idx === 0 ? 'active' : ''}" onclick="changeImage(${idx})">
                                <img src="${img}" alt="Thumbnail">
                            </div>
                        `).join('')}
                    </div>
                `;
            } else {
                galleryHtml = `
                    <div class="gallery-main">
                        <img src="https://via.placeholder.com/800x400?text=HTM+Rentals" alt="${unit.unit_name}">
                    </div>
                `;
            }

            // Build amenities
            let amenitiesHtml = '';
            const defaultAmenities = ['Free WiFi', 'Smart TV', 'Air Conditioning', 'Kitchen', 'Tea & Coffee', 'Hot Water'];
            const amenitiesList = (unit.amenities && unit.amenities.length) ? unit.amenities : defaultAmenities;
            amenitiesHtml = amenitiesList.map(a => `<span><i class="fas fa-check-circle" style="color:#40B5AD;"></i> ${a}</span>`).join('');

            document.getElementById('content').innerHTML = `
                <a href="index.html" class="back-link">← Back to Units</a>
                
                <div class="card">
                    ${galleryHtml}
                    <h1 class="unit-name">${unit.unit_name}</h1>
                    <div class="unit-price">${price} <span style="font-size: 16px;">/night</span></div>
                    <div class="features">
                        <span><i class="fas fa-user-friends"></i> ${unit.max_guests} guests</span>
                        <span><i class="fas fa-bed"></i> ${unit.bedrooms} bed(s)</span>
                        <span><i class="fas fa-bath"></i> ${unit.bathrooms} bath(s)</span>
                    </div>
                    <p>${unit.description || 'Comfortable apartment with all essential amenities for a relaxing stay.'}</p>
                    <div style="margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px;">
                        ${amenitiesHtml}
                    </div>
                    <p style="margin-top: 15px;"><strong>Currency:</strong> ${currency === 'MVR' ? 'MVR (Local Package - Payment in MVR)' : 'USD (Foreign Guest - Payment in USD)'}</p>
                </div>

                <div class="booking-row">
                    <div class="card">
                        <div class="calendar-header">
                            <h3 id="calendar-month-year">${monthNames[currentMonth]} ${currentYear}</h3>
                            <div class="calendar-nav">
                                <button id="prev-month"><i class="fas fa-chevron-left"></i></button>
                                <button id="next-month"><i class="fas fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div id="calendar-grid" class="calendar-grid"></div>
                        <div class="legend">
                            <div><span class="legend-color" style="background: white; border: 2px solid #40B5AD;"></span> Available</div>
                            <div><span class="legend-color" style="background: #ffebee;"></span> Booked</div>
                            <div><span class="legend-color" style="background: #006994;"></span> Selected</div>
                        </div>
                    </div>

                    <div class="card">
                        <h3>Request Booking</h3>
                        <form id="booking-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Check-in</label>
                                    <input type="text" id="check-in" readonly placeholder="Select date" required>
                                </div>
                                <div class="form-group">
                                    <label>Check-out</label>
                                    <input type="text" id="check-out" readonly placeholder="Select date" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Guests</label>
                                <select id="guests" required>
                                    <option value="">Select</option>
                                    <option value="1">1 Guest</option>
                                    <option value="2">2 Guests</option>
                                    <option value="3">3 Guests</option>
                                    <option value="4">4 Guests</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="name" placeholder="Full name" required>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Phone</label>
                                    <input type="tel" id="phone" placeholder="Phone number" required>
                                </div>
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" id="email" placeholder="Email address" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Special Requests</label>
                                <textarea id="requests" rows="2" placeholder="Any special requirements?"></textarea>
                            </div>

                            <div id="price-breakdown" class="price-breakdown" style="display: none;">
                                <div class="price-row">
                                    <span>${symbol}${nightlyRate} × <span id="night-count">0</span> nights</span>
                                    <span id="subtotal">${symbol}0</span>
                                </div>
                                <div class="price-row total">
                                    <span>Total</span>
                                    <span id="total">${symbol}0</span>
                                </div>
                            </div>

                            <div id="form-message" class="message"></div>
                            <button type="submit" class="btn">Request Booking</button>
                        </form>
                    </div>
                </div>
            `;

            // Attach event listeners
            document.getElementById('prev-month').addEventListener('click', () => {
                currentMonth--;
                if (currentMonth < 0) { currentMonth = 11; currentYear--; }
                generateCalendar(currentMonth, currentYear);
            });
            document.getElementById('next-month').addEventListener('click', () => {
                currentMonth++;
                if (currentMonth > 11) { currentMonth = 0; currentYear++; }
                generateCalendar(currentMonth, currentYear);
            });
            document.getElementById('booking-form').addEventListener('submit', submitBooking);
        }

        // Gallery image changer
        window.changeImage = function(index) {
            const allImages = [];
            if (unit.featured_image) allImages.push(unit.featured_image);
            if (unit.gallery_images && unit.gallery_images.length) {
                allImages.push(...unit.gallery_images);
            }
            const mainImg = document.querySelector('#gallery-main img');
            if (mainImg) mainImg.src = allImages[index];
            
            document.querySelectorAll('.gallery-thumb').forEach((thumb, i) => {
                if (i === index) thumb.classList.add('active');
                else thumb.classList.remove('active');
            });
        };

        loadUnit();
    </script>
</body>
</html>
