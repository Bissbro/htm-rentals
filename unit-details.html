<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>HTM Rentals | Unit Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F8F9FA; padding: 20px; }
        .container { max-width: 1280px; margin: 0 auto; }

        :root {
            --navy: #0A2540;
            --ocean: #006994;
            --turquoise: #40B5AD;
            --radius: 16px;
            --shadow: 0 8px 30px rgba(0,0,0,0.05);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo img { height: 40px; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 600; }
        .logo-text span:first-child { color: var(--navy); }
        .logo-text span:last-child { color: var(--turquoise); }
        .back-link { color: var(--ocean); text-decoration: none; font-weight: 500; transition: all 0.3s ease; }
        .back-link:hover { color: var(--turquoise); }

        .card {
            background: white;
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
        }
        .unit-name {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 500;
            color: var(--navy);
            margin-bottom: 12px;
        }
        .starting-from {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6C757D;
            margin-bottom: 4px;
        }
        .prices {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
            margin: 8px 0 16px;
        }
        .price-amount { font-size: 1.5rem; font-weight: 600; color: var(--ocean); }
        .price-nightly { font-size: 0.75rem; color: #6C757D; }
        .price-sep { font-size: 1rem; color: #6C757D; }
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin: 16px 0;
            padding-top: 16px;
            border-top: 1px solid #e9ecef;
        }
        .features span { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #495057; }
        .features i { color: var(--turquoise); }

        .gallery-container { margin-bottom: 24px; }
        .gallery-main {
            width: 100%;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            border-radius: var(--radius);
            position: relative;
            touch-action: pan-y pinch-zoom;
            cursor: grab;
        }
        .gallery-main:active { cursor: grabbing; }
        .gallery-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }
        .gallery-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
        }
        .gallery-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #CED4DA;
            cursor: pointer;
            transition: all 0.3s;
        }
        .gallery-dot.active { width: 24px; border-radius: 4px; background: var(--ocean); }

        .external-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .ext-btn {
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            text-align: center;
        }
        .ext-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .ext-btn.airbnb { background: #FF5A5F; color: white; }
        .ext-btn.agoda { background: #1E5D86; color: white; }
        .ext-btn.trip { background: #2680EB; color: white; }
        .ext-btn.booking { background: #003580; color: white; }

        .local-btn {
            width: 100%;
            padding: 14px;
            background: var(--turquoise);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .local-btn:hover { background: #36a099; transform: translateY(-2px); }

        .booking-form-container { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #E9ECEF; }
        .booking-form-container.show { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 13px; color: #495057; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E9ECEF;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--turquoise); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .price-breakdown {
            background: #F8F9FA;
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
        }
        .price-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #E9ECEF; }
        .price-row.total { border-bottom: none; font-weight: 700; font-size: 16px; padding-top: 12px; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--ocean);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .submit-btn:hover { background: var(--navy); transform: translateY(-2px); }
        .message { padding: 14px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .message.success { background: #D4EDDA; color: #155724; display: block; }
        .message.error { background: #F8D7DA; color: #721C24; display: block; }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .calendar-nav button {
            background: #F8F9FA;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }
        .calendar-nav button:hover { background: var(--turquoise); color: white; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .calendar-weekday { font-weight: 600; padding: 10px 0; font-size: 12px; color: #6C757D; }
        .calendar-day {
            padding: 10px 5px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .calendar-day:hover:not(.booked):not(.empty) { background: var(--turquoise); color: white; }
        .calendar-day.booked { background: #FFEBEE; color: #DC3545; text-decoration: line-through; cursor: not-allowed; }
        .calendar-day.selected { background: var(--ocean); color: white; }
        .calendar-day.today { border: 2px solid #FF6B6B; }
        .calendar-day.empty { cursor: default; background: transparent; }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #E9ECEF;
            font-size: 12px;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            display: inline-block;
            margin-right: 6px;
        }

        .loading { text-align: center; padding: 60px; color: #6C757D; }

        @media (max-width: 768px) {
            body { padding: 16px; }
            .card { padding: 20px; }
            .unit-name { font-size: 24px; }
            .price-amount { font-size: 1.2rem; }
            .price-nightly { font-size: 0.7rem; }
            .external-buttons { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .form-row { grid-template-columns: 1fr; }
            .calendar-day { padding: 8px 3px; font-size: 12px; }
            .prices { flex-direction: column; align-items: flex-start; gap: 4px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="logo">
                <img src="https://i.ibb.co/PvXs30RQ/IMG-20260204-180053-375.webp" alt="HTM Rentals">
                <div class="logo-text"><span>HTM</span><span>Rentals</span></div>
            </a>
            <a href="index.html" class="back-link">← Back to Units</a>
        </div>
        <div id="content"><div class="loading">Loading unit details...</div></div>
    </div>

    <script>
        const API_BASE_URL = 'https://api.htmrentals.com/api';
        const urlParams = new URLSearchParams(window.location.search);
        const unitId = urlParams.get('id');

        let unit = null;
        let selectedCheckIn = null;
        let selectedCheckOut = null;
        let bookedDates = [];
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        let galleryImages = [];
        let currentImageIndex = 0;
        let slideInterval = null;
        let touchStartX = 0;

        async function loadUnit() {
            if (!unitId) { document.getElementById('content').innerHTML = '<div class="card"><p>No unit selected. <a href="index.html">Go back</a></p></div>'; return; }
            try {
                const res = await fetch(`${API_BASE_URL}/units/${unitId}`);
                const data = await res.json();
                if (data.success && data.unit) {
                    unit = data.unit;
                    if (typeof unit.gallery_images === 'string') { try { unit.gallery_images = JSON.parse(unit.gallery_images); } catch(e) { unit.gallery_images = []; } }
                    if (typeof unit.amenities === 'string') { try { unit.amenities = JSON.parse(unit.amenities); } catch(e) { unit.amenities = []; } }
                    unit.blocked_dates = data.blocked_dates || [];
                    renderUnitDetails();
                    await fetchAvailability();
                    generateCalendar(currentMonth, currentYear);
                    setupGallery();
                } else { document.getElementById('content').innerHTML = '<div class="card"><p>Unit not found. <a href="index.html">Go back</a></p></div>'; }
            } catch(e) { document.getElementById('content').innerHTML = '<div class="card"><p>Failed to load unit. <a href="index.html">Go back</a></p></div>'; }
        }

        function setupGallery() {
            galleryImages = [];
            if (unit.featured_image) galleryImages.push(unit.featured_image);
            if (unit.gallery_images && unit.gallery_images.length) galleryImages.push(...unit.gallery_images);
            if (galleryImages.length === 0) return;
            const mainImg = document.getElementById('gallery-main-img');
            if (mainImg) mainImg.src = galleryImages[0];
            const galleryMain = document.getElementById('gallery-main');
            if (galleryMain) {
                galleryMain.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
                galleryMain.addEventListener('touchend', (e) => {
                    const endX = e.changedTouches[0].clientX;
                    const diff = touchStartX - endX;
                    if (Math.abs(diff) > 50) { if (diff > 0) nextImage(); else prevImage(); }
                });
                let mouseStartX = 0, isDragging = false;
                galleryMain.addEventListener('mousedown', (e) => { isDragging = true; mouseStartX = e.clientX; });
                window.addEventListener('mouseup', (e) => {
                    if (!isDragging) return;
                    isDragging = false;
                    const diff = mouseStartX - e.clientX;
                    if (Math.abs(diff) > 50) { if (diff > 0) nextImage(); else prevImage(); }
                });
            }
            startAutoSlide();
        }

        function nextImage() { if (galleryImages.length) { currentImageIndex = (currentImageIndex + 1) % galleryImages.length; updateGalleryImage(); } }
        function prevImage() { if (galleryImages.length) { currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length; updateGalleryImage(); } }
        function updateGalleryImage() {
            const mainImg = document.getElementById('gallery-main-img');
            if (mainImg) mainImg.src = galleryImages[currentImageIndex];
            const dots = document.querySelectorAll('.gallery-dot');
            dots.forEach((dot, idx) => dot.classList.toggle('active', idx === currentImageIndex));
            resetAutoSlide();
        }
        function goToImage(index) { currentImageIndex = index; updateGalleryImage(); }
        function startAutoSlide() { if (slideInterval) clearInterval(slideInterval); if (galleryImages.length > 1) slideInterval = setInterval(nextImage, 5000); }
        function resetAutoSlide() { if (slideInterval) clearInterval(slideInterval); if (galleryImages.length > 1) slideInterval = setInterval(nextImage, 5000); }

        // Fetch only CONFIRMED bookings (pending does NOT block dates)
        async function fetchAvailability() {
            if (!unit) return;
            try {
                const res = await fetch(`${API_BASE_URL}/bookings/availability?unit_id=${unit.id}`);
                const data = await res.json();
                if (data.success) {
                    bookedDates = [];
                    // Only confirmed bookings block dates
                    data.bookings.forEach(booking => {
                        const start = new Date(booking.check_in_date);
                        const end = new Date(booking.check_out_date);
                        // Exclude check-out date
                        for (let d = new Date(start); d < end; d.setDate(d.getDate() + 1)) {
                            bookedDates.push(d.toISOString().split('T')[0]);
                        }
                    });
                    if (unit.blocked_dates) unit.blocked_dates.forEach(date => bookedDates.push(date));
                }
            } catch(e) { console.error(e); }
        }

        function generateCalendar(month, year) {
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let html = '';
            const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            weekdays.forEach(day => html += `<div class="calendar-weekday">${day}</div>`);
            for (let i = 0; i < firstDay; i++) html += '<div class="calendar-day empty"></div>';
            const today = new Date();
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isBooked = bookedDates.includes(dateStr);
                const isToday = today.getDate() === d && today.getMonth() === month && today.getFullYear() === year;
                const isSelected = (selectedCheckIn === dateStr || selectedCheckOut === dateStr);
                let classes = 'calendar-day';
                if (isBooked) classes += ' booked';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                html += `<div class="${classes}" data-date="${dateStr}" onclick="selectDate('${dateStr}', ${isBooked})">${d}</div>`;
            }
            const grid = document.getElementById('calendar-grid');
            if (grid) grid.innerHTML = html;
            const monthYear = document.getElementById('calendar-month-year');
            if (monthYear) monthYear.textContent = `${monthNames[month]} ${year}`;
        }

        // Updated selectDate function - allows resetting check-in by clicking earlier date
        function selectDate(dateStr, isBooked) {
            if (isBooked) {
                showMessage('This date is not available', 'error');
                return;
            }
            
            // If no check-in selected, or both are selected (start over)
            if (!selectedCheckIn || (selectedCheckIn && selectedCheckOut)) {
                selectedCheckIn = dateStr;
                selectedCheckOut = null;
                document.getElementById('check-in').value = formatDate(dateStr);
                document.getElementById('check-out').value = '';
                document.getElementById('price-breakdown').style.display = 'none';
            } 
            else if (selectedCheckIn && !selectedCheckOut) {
                const checkInDate = new Date(selectedCheckIn);
                const clickedDate = new Date(dateStr);
                
                // If clicked date is BEFORE check-in date, reset check-in to this new date
                if (clickedDate < checkInDate) {
                    selectedCheckIn = dateStr;
                    selectedCheckOut = null;
                    document.getElementById('check-in').value = formatDate(dateStr);
                    document.getElementById('check-out').value = '';
                    document.getElementById('price-breakdown').style.display = 'none';
                    generateCalendar(currentMonth, currentYear);
                    return;
                }
                
                // Allow same-day checkout (1 night stay)
                if (clickedDate < checkInDate) {
                    showMessage('Check-out must be on or after check-in', 'error');
                    return;
                }
                
                // Check if any dates in between are booked
                let hasBooked = false;
                let cur = new Date(checkInDate);
                cur.setDate(cur.getDate() + 1);
                while (cur < clickedDate) {
                    if (bookedDates.includes(cur.toISOString().split('T')[0])) {
                        hasBooked = true;
                        break;
                    }
                    cur.setDate(cur.getDate() + 1);
                }
                
                if (hasBooked) {
                    showMessage('Some dates in between are booked', 'error');
                    return;
                }
                
                selectedCheckOut = dateStr;
                document.getElementById('check-out').value = formatDate(dateStr);
                
                // Calculate nights (minimum 1)
                const nights = Math.max(1, Math.ceil((clickedDate - checkInDate) / (1000 * 60 * 60 * 24)));
                const total = nights * parseFloat(unit.rate_mvr);
                
                document.getElementById('night-count').textContent = nights;
                document.getElementById('subtotal').textContent = `MVR ${total}`;
                document.getElementById('total').textContent = `MVR ${total}`;
                document.getElementById('price-breakdown').style.display = 'block';
            }
            
            generateCalendar(currentMonth, currentYear);
        }

        function formatDate(dateStr) { const d = new Date(dateStr); return d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }); }
        function showMessage(msg, type) { const el = document.getElementById('form-message'); if (!el) return; el.textContent = msg; el.className = `message ${type}`; setTimeout(() => el.style.display = 'none', 5000); }
        function toggleBookingForm() { const form = document.getElementById('booking-form-container'); form.classList.toggle('show'); if (form.classList.contains('show')) document.getElementById('booking-form').scrollIntoView({ behavior: 'smooth' }); }

        // UPDATED: Submit booking directly to database, then open WhatsApp as background notification
        async function submitBooking(e) {
            e.preventDefault();
            
            if (!selectedCheckIn || !selectedCheckOut) {
                showMessage('Please select check-in and check-out dates', 'error');
                return;
            }
            
            const guests = document.getElementById('guests').value;
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            
            if (!guests || !name || !phone) {
                showMessage('Please fill all required fields', 'error');
                return;
            }
            
            const submitBtn = e.target.querySelector('.submit-btn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            submitBtn.disabled = true;
            
            try {
                // Calculate nights (minimum 1)
                const checkInDate = new Date(selectedCheckIn);
                const checkOutDate = new Date(selectedCheckOut);
                const nights = Math.max(1, Math.ceil((checkOutDate - checkInDate) / (1000 * 60 * 60 * 24)));
                const total = nights * parseFloat(unit.rate_mvr);
                
                // Save booking to database (status = 'pending')
                const res = await fetch(`${API_BASE_URL}/bookings/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        unit_id: unit.id,
                        guest_name: name,
                        guest_email: '',
                        guest_phone: phone,
                        check_in_date: selectedCheckIn,
                        check_out_date: selectedCheckOut,
                        number_of_guests: parseInt(guests),
                        special_requests: '',
                        currency: 'MVR'
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    // Show success message
                    showMessage('Booking request sent! We will contact you shortly.', 'success');
                    
                    // Send WhatsApp notification to admin (background - user doesn't need to click)
                    const msg = `*New Local Booking Request - HTM Rentals*%0A%0A` +
                        `*Booking ID:* ${data.booking_id}%0A` +
                        `*Unit:* ${unit.unit_name}%0A` +
                        `*Guest:* ${name}%0A` +
                        `*Phone:* ${phone}%0A` +
                        `*Check-in:* ${formatDate(selectedCheckIn)}%0A` +
                        `*Check-out:* ${formatDate(selectedCheckOut)}%0A` +
                        `*Nights:* ${nights}%0A` +
                        `*Guests:* ${guests}%0A` +
                        `*Total:* MVR ${total}%0A%0A` +
                        `Please confirm this booking in the admin panel.`;
                    
                    // Open WhatsApp in background (new tab)
                    window.open(`https://wa.me/9609373113?text=${msg}`, '_blank');
                    
                    // Clear the form
                    selectedCheckIn = null;
                    selectedCheckOut = null;
                    document.getElementById('check-in').value = '';
                    document.getElementById('check-out').value = '';
                    document.getElementById('price-breakdown').style.display = 'none';
                    document.getElementById('guests').value = '';
                    document.getElementById('name').value = '';
                    document.getElementById('phone').value = '';
                    
                    // Refresh calendar to show newly booked dates (but they won't be blocked until confirmed)
                    generateCalendar(currentMonth, currentYear);
                    
                } else {
                    showMessage(data.error || 'Booking failed', 'error');
                }
            } catch(error) {
                console.error('Booking error:', error);
                showMessage('Network error. Please try again.', 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }

        function renderUnitDetails() {
            const defaultAmenities = ['Free WiFi', 'Smart TV', 'Air Conditioning', 'Kitchen', 'Tea & Coffee', 'Hot Water'];
            const amenitiesList = (unit.amenities && unit.amenities.length) ? unit.amenities : defaultAmenities;
            let galleryDotsHtml = '';
            if (galleryImages.length > 1) for (let i = 0; i < galleryImages.length; i++) galleryDotsHtml += `<div class="gallery-dot ${i === 0 ? 'active' : ''}" onclick="goToImage(${i})"></div>`;
            let externalButtonsHtml = '';
            if (unit.airbnb_url) externalButtonsHtml += `<a href="${unit.airbnb_url}" target="_blank" class="ext-btn airbnb"><i class="fab fa-airbnb"></i> Airbnb</a>`;
            if (unit.agoda_url) externalButtonsHtml += `<a href="${unit.agoda_url}" target="_blank" class="ext-btn agoda">Agoda</a>`;
            if (unit.trip_url) externalButtonsHtml += `<a href="${unit.trip_url}" target="_blank" class="ext-btn trip">Trip.com</a>`;
            if (unit.booking_url) externalButtonsHtml += `<a href="${unit.booking_url}" target="_blank" class="ext-btn booking">Booking.com</a>`;

            document.getElementById('content').innerHTML = `
                <div class="card">
                    <div class="gallery-container"><div class="gallery-main" id="gallery-main"><img id="gallery-main-img" src="${galleryImages[0] || 'https://via.placeholder.com/800x600?text=HTM+Rentals'}" alt="${unit.unit_name}"></div>${galleryImages.length > 1 ? `<div class="gallery-dots" id="gallery-dots">${galleryDotsHtml}</div>` : ''}</div>
                    <h1 class="unit-name">${escapeHtml(unit.unit_name)}</h1>
                    <div class="starting-from">Starting from</div>
                    <div class="prices">
                        <span class="price-amount">$${unit.rate_usd}</span> <span class="price-nightly">nightly</span>
                        <span class="price-sep">|</span>
                        <span class="price-amount">MVR ${unit.rate_mvr}</span> <span class="price-nightly">nightly</span>
                    </div>
                    <div class="features"><span><i class="fas fa-user-friends"></i> ${unit.max_guests} guests</span><span><i class="fas fa-bed"></i> ${unit.bedrooms} bed(s)</span></div>
                    <p>${unit.description || 'Comfortable apartment with all essential amenities for a relaxing stay.'}</p>
                    <div style="margin: 20px 0; display: flex; flex-wrap: wrap; gap: 8px;">${amenitiesList.map(a => `<span style="background:#F8F9FA; padding:6px 14px; border-radius:30px; font-size:13px;"><i class="fas fa-check-circle" style="color:var(--turquoise); margin-right:6px;"></i> ${escapeHtml(a)}</span>`).join('')}</div>
                </div>
                <div class="card">
                    <h3>Book Your Stay</h3>
                    ${externalButtonsHtml ? `<div class="external-buttons">${externalButtonsHtml}</div>` : ''}
                    <button class="local-btn" onclick="toggleBookingForm()">Local Package (MVR)</button>
                    <div id="booking-form-container" class="booking-form-container">
                        <h4>Local Booking Form</h4>
                        <div class="calendar-header"><h4 id="calendar-month-year">${monthNames[currentMonth]} ${currentYear}</h4><div class="calendar-nav"><button id="prev-month"><i class="fas fa-chevron-left"></i></button><button id="next-month"><i class="fas fa-chevron-right"></i></button></div></div>
                        <div id="calendar-grid" class="calendar-grid"></div>
                        <div class="legend"><div><span class="legend-color" style="background:white; border:2px solid var(--turquoise);"></span> Available</div><div><span class="legend-color" style="background:#FFEBEE;"></span> Booked</div><div><span class="legend-color" style="background:var(--ocean);"></span> Selected</div></div>
                        <form id="booking-form" style="margin-top: 24px;">
                            <div class="form-row"><div class="form-group"><label>Check-in</label><input type="text" id="check-in" readonly placeholder="Select date" required></div><div class="form-group"><label>Check-out</label><input type="text" id="check-out" readonly placeholder="Select date" required></div></div>
                            <div class="form-group"><label>Number of Guests</label><select id="guests" required><option value="">Select</option><option value="1">1 Guest</option><option value="2">2 Guests</option><option value="3">3 Guests</option><option value="4">4 Guests</option></select></div>
                            <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Full name" required></div>
                            <div class="form-group"><label>Phone Number</label><input type="tel" id="phone" placeholder="Phone number" required></div>
                            <div id="price-breakdown" class="price-breakdown" style="display:none;"><div class="price-row"><span>MVR ${unit.rate_mvr} × <span id="night-count">0</span> nights</span><span id="subtotal">MVR 0</span></div><div class="price-row total"><span>Total</span><span id="total">MVR 0</span></div></div>
                            <div id="form-message" class="message"></div>
                            <button type="submit" class="submit-btn">Request Booking (MVR)</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('prev-month')?.addEventListener('click', () => { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } generateCalendar(currentMonth, currentYear); });
            document.getElementById('next-month')?.addEventListener('click', () => { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } generateCalendar(currentMonth, currentYear); });
            document.getElementById('booking-form')?.addEventListener('submit', submitBooking);
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        loadUnit();
    </script>
</body>
</html>
